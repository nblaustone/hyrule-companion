<script>const{useState:M,useEffect:U,useMemo:I,useCallback:j}=React,q={async get(n){try{if(typeof window!="undefined"&&window.storage){const o=await window.storage.get(n,!1);return o?o.value:null}if(typeof localStorage!="undefined")return localStorage.getItem(n)}catch{}return null},async set(n,o){try{if(typeof window!="undefined"&&window.storage){await window.storage.set(n,o,!1);return}typeof localStorage!="undefined"&&localStorage.setItem(n,o)}catch{}}},J=new Set(["step","loot","optional","reward"]),oe={id:"plateau",name:"The Great Plateau",sub:"Tutorial",kind:"region",tagline:"Where Link awakens \u2014 the tutorial that holds all of Hyrule in miniature.",sections:[{id:"awk",name:"Awakening",sub:"Shrine of Resurrection",steps:[{id:"awk1",k:"step",t:"Take the Sheikah Slate from the pedestal in front of you. This is your map, scope, runes \u2014 everything.",items:[{name:"Sheikah Slate",cat:"key",note:"Map, scope & rune device"}]},{id:"awk2",k:"loot",t:"Open the two chests in the next room for the Old Shirt and Well-Worn Trousers. Equip both (\uFF0B button).",items:[{name:"Old Shirt",cat:"armor",note:"Starter top"},{name:"Well-Worn Trousers",cat:"armor",note:"Starter legs"}]},{id:"awk3",k:"step",t:"Hold the Slate to the second pedestal to open the great door, then climb the ledges out into the light."},{id:"awk4",k:"step",t:"Outside, grab the Tree Branch leaning on a rock \u2014 your first weapon \u2014 and pick a couple of Hylian Mushrooms."},{id:"awk5",k:"tip",t:"Almost everything can be climbed, but climbing drains the green stamina wheel. If it empties mid-climb, Link falls. Keep early climbs short."}]},{id:"oldman",name:"The Old Man & Temple of Time",sub:"Get your bearings",steps:[{id:"om1",k:"step",t:"Head down to the Old Man at the campfire and talk to him. He mentions the Temple of Time and offers you a Torch."},{id:"om2",k:"loot",t:"Inside the Temple of Time ruins: climb the rubble to a chest with a Traveler's Bow, and grab Arrows near the altar. This is a common starter bow \u2014 there are several on the Plateau (another waits inside Oman Au). Grab both; bows break, so spares help.",items:[{name:"Traveler's Bow",cat:"bow",note:"From Temple of Time \xB7 power 5"}]},{id:"om3",k:"tip",t:"Note the Goddess Statue inside the temple \u2014 you'll return here to trade Spirit Orbs for a heart or stamina upgrade."},{id:"om4",k:"optional",t:"The Temple roof hides a Korok seed under a small rock. Korok seeds expand your inventory slots later."}]},{id:"tower",name:"Raise the Plateau Tower",sub:"\u201CFollow the Sheikah Slate\u201D",steps:[{id:"tw1",k:"step",t:"Follow the marker to the round stone pedestal near the center of the Plateau and place the Slate in the slot."},{id:"tw2",k:"step",t:"The Sheikah Tower erupts upward. At the top, examine the glowing terminal to download the Plateau map."},{id:"tw3",k:"step",t:"Climb down. The Old Man glides over and asks for a shrine's treasure in trade for the Paraglider \u2014 you actually need all four shrines."},{id:"tw4",k:"tip",t:"From up high, click the right stick for the Scope. Look for orange pillars of light \u2014 those are the four shrines \u2014 and drop a pin on each."}]},{id:"oman",name:"Oman Au Shrine",sub:"Magnesis Trial \xB7 pond near the tower",reward:"Magnesis Rune \u2014 move metal",steps:[{id:"oa0",k:"optional",t:"At night, Stalkoblins (reassembling skeletons) rise around the shrine and the tower field \u2014 smash the skull to drop them, and grab any weapons they leave, like a Traveler's Sword. Free early melee, but they fall apart again at dawn.",items:[{name:"Traveler's Sword",cat:"weapon",note:"Dropped by Stalkoblins at night near Oman Au"}]},{id:"oa1",k:"step",t:"Enter and download the MAGNESIS rune (lift and move anything metal).",items:[{name:"Magnesis",cat:"rune",note:"Move metal objects",rune:"magnesis"}]},{id:"oa2",k:"step",t:"Use Magnesis (L) on the two metal floor slabs and pull them aside to open the passage."},{id:"oa3",k:"step",t:"Raise the submerged metal plank with Magnesis and lay it across the water as a bridge, then cross."},{id:"oa4",k:"tip",t:"A Guardian Scout activates ahead. Easy kill: drop a metal slab on it with Magnesis."},{id:"oa5",k:"loot",t:"Pull the submerged chest out of the water with Magnesis for a Traveler's Bow. Same common bow as the Temple of Time one \u2014 not a glitch, there are simply several on the Plateau. Keep the spare.",items:[{name:"Traveler's Bow",cat:"bow",note:"From Oman Au Shrine \xB7 power 5"}]},{id:"oa6",k:"step",t:"At the sealed door, grab the metal locking bar through the door with Magnesis and slide it out, then go through."},{id:"oa7",k:"reward",t:"Examine Monk Oman Au's altar to claim your 1st Spirit Orb.",items:[{name:"Spirit Orb",cat:"key",note:"Oman Au Shrine",orb:!0}]}]},{id:"jabaij",name:"Ja Baij Shrine",sub:"Bomb Trial \xB7 Eastern Abbey (east)",reward:"Remote Bomb Rune",steps:[{id:"jb0",k:"warn",t:"HAZARD: the Eastern Abbey is full of dormant Guardians. If a red beam locks onto you, sprint behind cover immediately \u2014 a hit here can one-shot you. Approach from high ground or the north wall."},{id:"jb1",k:"step",t:"Download the REMOTE BOMB rune. Switch round/cube bombs with the D-pad; detonate by pressing L again.",items:[{name:"Remote Bombs",cat:"rune",note:"Infinite round & cube bombs",rune:"bomb"}]},{id:"jb2",k:"step",t:"Bomb the breakable rock piles blocking the two paths. Do the right path first."},{id:"jb3",k:"loot",t:"Behind the right rocks: a chest with the Traveler's Claymore \u2014 a powerful two-handed sword (hold Y for a spin attack).",items:[{name:"Traveler's Claymore",cat:"weapon",note:"Two-handed \xB7 high damage"}]},{id:"jb4",k:"step",t:"Up the ladder, drop a CUBE bomb onto the moving platform; detonate when it carries the bomb next to the blocked doorway."},{id:"jb5",k:"loot",t:"Use the bomb launcher to fling a ROUND bomb into the breakable wall, revealing a chest with Amber.",items:[{name:"Amber",cat:"material",note:"Gem \xB7 sell or upgrade armor"}]},{id:"jb6",k:"step",t:"Stand on the far launcher to be flung across to the altar."},{id:"jb7",k:"reward",t:"Claim your 2nd Spirit Orb from Monk Ja Baij.",items:[{name:"Spirit Orb",cat:"key",note:"Ja Baij Shrine",orb:!0}]}]},{id:"warm",name:"Stay Warm First",sub:"Before the mountain shrines",steps:[{id:"wd0",k:"warn",t:"The last two shrines are up cold Mount Hylia. Go up unprepared and you'll lose hearts to the cold. Sort warmth first."},{id:"wd1",k:"step",t:"Quick fix: cook 2\u20133 Spicy Peppers into Spicy Saut\xE9ed Peppers for a few minutes of cold resistance. (See the Cook tab.)"},{id:"wd2",k:"step",t:"Better fix \u2014 the Warm Doublet: go to the Old Man's cabin (south, near Mount Hylia's base) and read his diary."},{id:"wd3",k:"step",t:"Cook his recipe \u2014 Spicy Meat and Seafood Fry = Raw Meat + Spicy Pepper + Hyrule Bass \u2014 then show him the dish."},{id:"wd4",k:"reward",t:"He rewards you with the Warm Doublet: permanent cold resistance. (Or grab it from his cabin chest after all 4 shrines.)",items:[{name:"Warm Doublet",cat:"armor",note:"Passive cold resistance"}]}]},{id:"owa",name:"Owa Daim Shrine",sub:"Stasis Trial \xB7 Mount Hylia (cold)",reward:"Stasis Rune",steps:[{id:"od1",k:"step",t:"Download the STASIS rune. Freeze the spinning cog/platform with Stasis (L), then run across while it's stopped.",items:[{name:"Stasis",cat:"rune",note:"Freeze time on one object",rune:"stasis"}]},{id:"od2",k:"step",t:"On the boulder ramp, Stasis an incoming boulder to freeze it and run past safely."},{id:"od3",k:"loot",t:"On a ledge to the right partway up: a chest with a Traveler's Shield.",items:[{name:"Traveler's Shield",cat:"shield",note:"Basic shield"}]},{id:"od4",k:"step",t:"The huge boulder blocking the exit: cast Stasis on it, whack it 5\u20136 times with a strong weapon (an Iron Sledgehammer is nearby). When Stasis ends, stored energy launches it away."},{id:"od5",k:"reward",t:"Claim your 3rd Spirit Orb from Monk Owa Daim.",items:[{name:"Spirit Orb",cat:"key",note:"Owa Daim Shrine",orb:!0}]},{id:"od6",k:"optional",t:"Outside, Stasis-and-smash the boulder on the ledge to reveal a hidden chest (another Traveler's Bow).",items:[{name:"Traveler's Bow",cat:"bow",note:"Behind Owa Daim \xB7 power 5"}]}]},{id:"keh",name:"Keh Namut Shrine",sub:"Cryonis Trial \xB7 Mount Hylia peak (cold)",reward:"Cryonis Rune",steps:[{id:"kn1",k:"step",t:"Download the CRYONIS rune. Aim at water under the raised gate, make an ice pillar to prop it open, then climb over.",items:[{name:"Cryonis",cat:"rune",note:"Raise ice pillars from water",rune:"cryonis"}]},{id:"kn2",k:"step",t:"A Guardian Scout fires from a ledge \u2014 raise an ice block as cover, then rush and finish it."},{id:"kn3",k:"step",t:"At the tall wall with a gap, make a vertical ice pillar under the gap to lift yourself up and over."},{id:"kn4",k:"loot",t:"Make an ice pillar under the high alcove ledge to reach a chest with a Traveler's Spear.",items:[{name:"Traveler's Spear",cat:"weapon",note:"Long reach"}]},{id:"kn5",k:"reward",t:"Claim your 4th Spirit Orb from Monk Keh Namut. All four shrines done!",items:[{name:"Spirit Orb",cat:"key",note:"Keh Namut Shrine",orb:!0}]}]},{id:"statue",name:"First Upgrade",sub:"Goddess Statue \xB7 Temple of Time",steps:[{id:"gs1",k:"step",t:"Return to the Goddess Statue (warp to the Tower, drop down). Pray with your 4 Spirit Orbs."},{id:"gs2",k:"reward",t:"Trade for ONE upgrade: a Heart Container (+1 heart) or a Stamina Vessel. For a first run, the extra heart helps you survive.",items:[{name:"Heart Container / Stamina Vessel",cat:"key",note:"First upgrade (4 orbs)"}]}]},{id:"glider",name:"The Paraglider",sub:"Meet the king \xB7 Temple roof",steps:[{id:"pg1",k:"step",t:"Climb to the Temple of Time roof. The Old Man reveals himself as King Rhoam and tells the story of the Calamity and Princess Zelda."},{id:"pg2",k:"reward",t:"He hands you the PARAGLIDER \u2014 your ticket off the Plateau and into all of Hyrule.",items:[{name:"Paraglider",cat:"key",note:"Glide off cliffs & towers"}]},{id:"pg3",k:"optional",t:"Loose ends: grab the Warm Doublet from his cabin if skipped, plus a few easy Korok seeds (Temple roof, lily-pad ring near the cabin, the pit where you woke up)."}]},{id:"leave",name:"Leave the Plateau",sub:"\u201CSeek Out Impa\u201D",steps:[{id:"lv1",k:"step",t:"Run off a cliff edge and press X to deploy the Paraglider. Steer with the stick; watch stamina so you don't drop mid-glide."},{id:"lv2",k:"step",t:"Glide east toward the Dueling Peaks. Next objective: Kakariko Village to meet Impa. The tutorial is over \u2014 Hyrule is open."}]}]},re={id:"kakariko",name:"Seek Out Impa",sub:"Kakariko Village",kind:"region",tagline:"Off the Plateau at last \u2014 east to the Dueling Peaks, then north to meet Impa.",sections:[{id:"k_cross",name:"Cross to the Dueling Peaks",sub:"Glide east \xB7 activate the tower",steps:[{id:"k1",k:"step",t:"Warp to Ja Baij Shrine (eastern edge of the Plateau) and paraglide east toward the Dueling Peaks \u2014 the huge mountain split down the middle."},{id:"k2",k:"optional",t:"Bosh Kala Shrine sits just off the path near the Outpost Ruins \u2014 an easy Spirit Orb on the way.",items:[{name:"Spirit Orb",cat:"key",note:"Bosh Kala Shrine",orb:!0}]},{id:"k3",k:"tip",t:"At Proxim Bridge, an NPC named Brigo gives directions to Kakariko if you talk to him."},{id:"k4",k:"step",t:"Climb and activate the Dueling Peaks Tower to fill in this region's map. Climb every tower you pass."},{id:"k5",k:"optional",t:"Ha Dahamar Shrine is by the river after the valley (a water/Cryonis puzzle) \u2014 another easy orb.",items:[{name:"Spirit Orb",cat:"key",note:"Ha Dahamar Shrine",orb:!0}]},{id:"k6",k:"loot",t:"Ree Dahee Shrine along the route rewards the Climber's Bandanna \u2014 climb faster, plus a little defense. Worth the detour.",items:[{name:"Climber's Bandanna",cat:"armor",note:"Climb faster"},{name:"Spirit Orb",cat:"key",note:"Ree Dahee Shrine",orb:!0}]}]},{id:"k_road",name:"The Road to Kakariko",sub:"Stable \xB7 Hestu \xB7 the river path",steps:[{id:"k7",k:"step",t:"Stop at the Dueling Peaks Stable to rest, buy supplies, and register a horse if you've tamed one."},{id:"k8",k:"tip",t:"BIG: find Hestu on the path (a giant Korok with maracas). His quest 'The Priceless Maracas' lets you trade Korok Seeds to expand your weapon, bow, and shield slots \u2014 do this as soon as you can."},{id:"k9",k:"step",t:"Follow the Squabble River north. An NPC by a fire near the gate (Nanna) will point you to Impa's house."}]},{id:"k_village",name:"Kakariko Village",sub:"Ta'loh Naeg \xB7 Impa",steps:[{id:"k10",k:"loot",t:"Climb the hill above the village to the Ta'loh Naeg Shrine. Its trial is a COMBAT TUTORIAL \u2014 it teaches perfect dodge, flurry rush, and parry. Do it; it also becomes the village's fast-travel point.",items:[{name:"Spirit Orb",cat:"key",note:"Ta'loh Naeg Shrine",orb:!0}]},{id:"k11",k:"tip",t:"Shops worth a look: Enchanted (armor \u2014 the Hylian set is solid, the Stealth set helps at night), the arrow shop, and the general store."},{id:"k12",k:"reward",t:"Go to Impa's house (the big one; guards let you pass once they spot your Slate). She tells the story of the Calamity and gives two quests \u2014 Free the Divine Beasts and Locked Mementos. Next stop: Purah at the Hateno Ancient Tech Lab."},{id:"k13",k:"optional",t:"Nearby: Great Fairy Cotera's fountain (Pikango's 'Find the Fairy Fountain' quest) upgrades armor. And 'The Stolen Heirloom' side quest with Paya/Dorian uncovers the Yiga Clan."}]}]},ne={id:"hateno",name:"Locked Mementos",sub:"Hateno \xB7 Purah",kind:"region",tagline:"Cross the Guardian-strewn plain to Hateno and get your Sheikah Slate's camera back.",sections:[{id:"h_town",name:"To Hateno Village",sub:"Tower \xB7 Myahm Agana",steps:[{id:"h0",k:"warn",t:"HAZARD: the route from Kakariko crosses Blatchery Plain / Fort Hateno \u2014 a field of broken AND active Guardians. Keep your distance and use cover; a hit can one-shot you. (You'll return here later for a memory.)"},{id:"h1",k:"step",t:"Head south then east into the Necluda region. Activate the Hateno Tower, then follow the road east to Hateno Village."},{id:"h2",k:"optional",t:"Myahm Agana Shrine is in the village \u2014 activate it for a warp point. Its optional trial is a tilt-the-maze ball puzzle (motion controls or Magnesis).",items:[{name:"Spirit Orb",cat:"key",note:"Myahm Agana Shrine",orb:!0}]}]},{id:"h_lab",name:"Hateno Tech Lab \u2014 Purah",sub:"Blue flame \xB7 Camera Rune",reward:"Camera Rune + Hyrule Compendium",steps:[{id:"h3",k:"step",t:"Follow the lantern-lined path east of the village up the cape to the Ancient Tech Lab. Talk to the girl (Purah) \u2192 she sends you to Symin \u2192 Symin reveals Purah IS the director. Talk to Purah again."},{id:"h4",k:"step",t:"Purah needs the blue flame. Grab a torch (one's by the lab door), then go down to the town's Ancient Furnace (the blue light past the ranch) and light your torch on it."},{id:"h5",k:"step",t:"Carry the flame back up to the lab. DON'T run (it blows out) and avoid rain. Light the stone lanterns along the way \u2014 they stay lit as checkpoints to re-light from."},{id:"h6",k:"reward",t:"Light the lab's furnace (the balloon-shaped one by the entrance) to open a warp pad. Purah uses the Guidance Stone to repair your Slate: you get the CAMERA RUNE, the album, and the Hyrule Compendium. Snap a photo of Purah and show her.",items:[{name:"Camera",cat:"rune",note:"Photograph things for the Compendium",rune:"camera"}]},{id:"h7",k:"optional",t:"Bonus: Symin's side quest (photograph a Sunshroom) upgrades your Sheikah Sensor. Reading Purah's diary triggers a prank. Hateno is a great home base \u2014 you can buy a house here from Bolson (3,000 rupees + bundles of wood)."}]},{id:"h_back",name:"Back to Impa",sub:"Start Captured Memories",steps:[{id:"h8",k:"step",t:"Return to Kakariko and talk to Impa again. This completes Locked Mementos and begins Captured Memories \u2014 and opens the path to the Divine Beasts."}]}]},ie={id:"memories",name:"Captured Memories",sub:"Optional \xB7 the real story",kind:"region",tagline:"Twelve photos Zelda left behind. Optional, but they tell the true story \u2014 and unlock a secret ending.",sections:[{id:"m_how",name:"How It Works",sub:"Album \xB7 Pikango \xB7 the reward",steps:[{id:"m1",k:"step",t:"Impa gives you an album of 12 photos taken 100 years ago. Each marks a real spot in Hyrule. Stand on the glowing patch of ground there to trigger the memory cutscene."},{id:"m2",k:"reward",t:"Show Impa your FIRST recovered memory to get the Champion's Tunic \u2014 strong, upgradeable armor. Grab an easy memory early just for this.",items:[{name:"Champion's Tunic",cat:"armor",note:"Reward for your 1st memory"}]},{id:"m3",k:"tip",t:"Finish 'Find the Fairy Fountain' (photograph Cotera for Pikango) so Pikango will hint at locations. Show him the nearest photo at a stable and he names the place."},{id:"m4",k:"warn",t:"Heads up: many memories sit deep in dangerous, far-off regions (Hyrule Castle, Gerudo, Akkala, Tabantha) well beyond where you are now. Treat this as a long-haul quest you chip away at \u2014 start with the easy, nearby ones."}]},{id:"m_list",name:"All 12 Memory Locations",sub:"Album order \xB7 tap to track",steps:[{id:"m_l1",k:"optional",t:"#1 Sacred Ground Ruins \u2014 Central Hyrule, in the forest just south of Hyrule Castle (a Guardian Stalker guards it)."},{id:"m_l2",k:"optional",t:"#2 Lake Kolomo \u2014 Central Hyrule, the forest on the west shore (near Riverside Stable)."},{id:"m_l3",k:"optional",t:"#3 Ancient Columns \u2014 Tabantha, atop the cliff just south after crossing the Tabantha Great Bridge."},{id:"m_l4",k:"optional",t:"#4 Kara Kara Bazaar \u2014 Gerudo Desert, the oasis on the way to Gerudo Town (you pass it in the story)."},{id:"m_l5",k:"optional",t:"#5 Eldin Canyon \u2014 Eldin, on a cliff between Hyrule Castle and the Great Hyrule Forest (climb from Woodland Stable)."},{id:"m_l6",k:"optional",t:"#6 Irch Plain \u2014 Hyrule Ridge, by the large tree southeast of Serenne Stable."},{id:"m_l7",k:"optional",t:"#7 West Necluda \u2014 near Scout's Hill by Lake Hylia (glide from Ja Baij Shrine to the big tree across the river)."},{id:"m_l8",k:"optional",t:"#8 Hyrule Castle \u2014 by Zelda's Study spire on the castle's west side. DANGEROUS \u2014 save for later."},{id:"m_l9",k:"optional",t:"#9 Spring of Power \u2014 Akkala, the goddess spring in North Akkala Valley west of East Akkala Stable."},{id:"m_l10",k:"optional",t:"#10 Sanidin Park Ruins \u2014 Hyrule Ridge, the giant horse statue on Safula Hill (near Outskirt Stable)."},{id:"m_l11",k:"optional",t:"#11 Lanayru Road \u2013 East Gate \u2014 Necluda, the gate at the base of cold Mount Lanayru (bring cold resistance)."},{id:"m_l12",k:"optional",t:"#12 Hyrule Field \u2014 Central Hyrule, the forest northeast of the Bottomless Swamp (near Wetland Stable)."},{id:"m_l13",k:"reward",t:"After all 12, report to Impa \u2014 she reveals the 13th photo (hanging in her house): #13 Blatchery Plain, the Guardian field near Fort Hateno. Recall it to finish the quest and unlock the bonus ending scene."}]}]},se={id:"vah_ruta",name:"Divine Beast Vah Ruta",sub:"Zora's Domain",kind:"beast",champion:"Mipha's Grace",tagline:"Your first Divine Beast \u2014 the easiest. Reach Zora's Domain, calm the elephant, and free Mipha.",sections:[{id:"r_reach",name:"Reach Zora's Domain",sub:"Sidon \xB7 the endless rain",steps:[{id:"r1",k:"step",t:"Head to the Lanayru region and the Zora River. Crossing toward the Great Zora Bridge starts 'Reach Zora's Domain'. Prince Sidon meets you at Inogo Bridge and offers to help."},{id:"r2",k:"warn",t:"It rains nonstop here (that's Vah Ruta), so climbing is too slick to rely on. Follow the luminous-stone path up the river instead, and watch for electric Lizalfos and Octoroks."},{id:"r3",k:"step",t:"Follow the river path all the way up to Zora's Domain. Sidon keeps cheering you along the way."}]},{id:"r_king",name:"King Dorephan & the Zora Armor",sub:"Throne room",steps:[{id:"r4",k:"reward",t:"King Dorephan explains Vah Ruta's rain is about to overflow the reservoir and flood Hyrule. He gives you the Zora Armor \u2014 swim faster and swim UP waterfalls. (Muzu, the old advisor, distrusts Hylians.)",items:[{name:"Zora Armor",cat:"armor",note:"Swim up waterfalls"}]},{id:"r5",k:"step",t:"Equip the Zora Armor and head down to talk to Muzu and Sidon. Your task: gather 20 Shock Arrows."},{id:"r6",k:"optional",t:"Do the Ne'ez Yohma Shrine in the Domain first for a fast-travel point right here.",items:[{name:"Spirit Orb",cat:"key",note:"Ne'ez Yohma Shrine",orb:!0}]}]},{id:"r_arrows",name:"20 Shock Arrows",sub:"Ploymus Mountain",steps:[{id:"r7",k:"step",t:"Use the Zora Armor to swim up the east waterfalls to Ploymus Mountain / Shatterback Point above the reservoir."},{id:"r8",k:"warn",t:"A Red-Maned Lynel roams here and it's brutal for a new player. You can SNEAK around it and pick up the 20+ Shock Arrows lying around the mountain without fighting \u2014 that's the safe play."},{id:"r9",k:"loot",t:"If you do fight the Lynel: Perfect Dodge \u2192 flurry, stun it with arrows to the face, and mount it. Either way, leave with 20 Shock Arrows.",items:[{name:"Shock Arrows \xD720",cat:"material",note:"Needed to calm Vah Ruta"}]}]},{id:"r_calm",name:"Calm Vah Ruta",sub:"Ride Sidon \xB7 4 pink orbs",steps:[{id:"r10",k:"step",t:"At East Reservoir Lake, ride on Sidon's back. Vah Ruta hurls ice blocks \u2014 shatter them with Cryonis (aim, A) or arrows before they hit."},{id:"r11",k:"step",t:"When Sidon swims beside a waterfall pouring off Ruta, swim UP it with the Zora Armor, deploy the paraglider at the top for slow-mo, and shoot a glowing pink orb on Ruta's back with a Shock Arrow."},{id:"r12",k:"step",t:"After two orbs it adds spiky ice \u2014 keep breaking it with Cryonis. Destroy all 4 pink orbs and Sidon drops you onto Vah Ruta."}]},{id:"r_inside",name:"Inside Vah Ruta",sub:"Activate 5 terminals",reward:"Control of Vah Ruta",steps:[{id:"r13",k:"step",t:"Mipha's spirit tells you to light 5 terminals, then the main control unit. First room: shoot the Malice eyeball at the top of the ramp, deal with the Guardian Scout, and use Cryonis to lift the gate on your left."},{id:"r14",k:"step",t:"The map terminal also lets you ROTATE Ruta's trunk \u2014 this aims its waterfall and controls the water level. Pour water onto the cogwheels to spin platforms; use Cryonis on water/ice and Magnesis on cranks and chests to reach each terminal."},{id:"r15",k:"optional",t:"Optional: swim up to Toto Lake (north) and use Magnesis on the submerged ruins for an Ice Arrows \xD710 chest.",items:[{name:"Ice Arrows \xD710",cat:"material",note:"Optional chest, Toto Lake"}]},{id:"r16",k:"step",t:"For the last terminal, rotate the trunk to pour water and douse the fire blocking the path. Grab any chests now \u2014 you can't return after the boss. Then activate all 5 terminals and the main control unit."}]},{id:"r_boss",name:"Boss: Waterblight Ganon",sub:"Free Mipha",reward:"Mipha's Grace + Heart Container",steps:[{id:"r17",k:"step",t:"Phase 1: it floats and stabs with a spear. Guard or dodge the thrusts, shoot its EYE (Shock Arrows are ideal) to stagger it, then rush in with melee."},{id:"r18",k:"step",t:"Phase 2 (around half health): it floods the room and flies corner to corner, throwing ice blocks (break with Cryonis) and spears. Make Cryonis pillars for height, shoot the eye, and keep dodging until it falls."},{id:"r19",k:"loot",t:"GRAB the Heart Container that drops BEFORE touching the terminal again.",items:[{name:"Heart Container",cat:"key",note:"From Waterblight Ganon"}]},{id:"r20",k:"reward",t:"Activate the main control unit to free Mipha. She grants Mipha's Grace \u2014 once per charge, if you fall in battle it auto-revives you with full + bonus hearts. Return to the Zora throne room for the cutscene; you can claim the Lightscale Trident from King Dorephan.",items:[{name:"Lightscale Trident",cat:"weapon",note:"Mipha's spear (from the King)"}]}]}]},le=[{name:"Magnesis",glyph:"magnesis",step:"oa1"},{name:"Bombs",glyph:"bomb",step:"jb1"},{name:"Stasis",glyph:"stasis",step:"od1"},{name:"Cryonis",glyph:"cryonis",step:"kn1"},{name:"Camera",glyph:"camera",step:"h6"}],he=[{name:"Mipha's Grace",from:"Vah Ruta",step:"r20",note:"Auto-revive once per charge"},{name:"Revali's Gale",from:"Vah Medoh",step:"md_b3",note:"Updraft on demand"},{name:"Daruk's Protection",from:"Vah Rudania",step:"rd_b3",note:"Shield, 3 hits"},{name:"Urbosa's Fury",from:"Vah Naboris",step:"nb_b3",note:"Lightning nova"}],de=[{id:"rune",name:"Runes",glyph:"stasis"},{id:"weapon",name:"Weapons",glyph:"sword"},{id:"bow",name:"Bows",glyph:"bow"},{id:"shield",name:"Shields",glyph:"shield"},{id:"armor",name:"Armor",glyph:"armor"},{id:"key",name:"Key Items",glyph:"key"},{id:"material",name:"Materials",glyph:"gem"}],ce=[{id:"shrines",name:"120 Shrines",sub:"Spirit Orbs everywhere",note:"Each shrine is a puzzle (or a Test of Strength) worth a Spirit Orb. Four orbs = one heart or stamina upgrade. The big long-term goal.",reward:"Hearts & stamina"},{id:"koroks",name:"900 Korok Seeds",sub:"Hidden mini-puzzles",note:"Tiny puzzles tucked all over Hyrule. Trade them to Hestu to expand your weapon, bow, and shield slots.",reward:"Bigger inventory"},{id:"fairies",name:"Great Fairies & armor",sub:"Upgrade your gear",note:"Unlock the four Great Fairy Fountains, then upgrade armor sets with monster parts for powerful set bonuses (stealth, cold, climbing, and more).",reward:"Stronger armor"},{id:"sidequests",name:"Side quests & Tarrey Town",sub:"The world's stories",note:"Dozens of side quests \u2014 building Tarrey Town and the horse-god questline are standouts, and many unlock useful gear.",reward:"Gear, rupees, lore"},{id:"dlc",name:"DLC & Master Mode",sub:"If you have the expansion",note:"Trial of the Sword, the Champions' Ballad, and the Master Cycle Zero; Master Mode is a tougher remix of the whole game.",reward:"Extra challenge"}],ue=[{id:"magnesis",name:"Magnesis",glyph:"magnesis",from:"Oman Au Shrine",what:"Lift, move, and drop anything metal \u2014 bridges, chests, slabs, even enemies.",tip:"Drop a metal slab on a Guardian Scout for a free kill."},{id:"bombs",name:"Remote Bombs",glyph:"bomb",from:"Ja Baij Shrine",what:"Two infinite bombs \u2014 round one rolls, cube one stays put \u2014 on a short cooldown.",tip:"Bombs break ore deposits and rock piles, and clear weak enemy groups."},{id:"stasis",name:"Stasis",glyph:"stasis",from:"Owa Daim Shrine",what:"Freeze one object in time. Hit it while frozen to store force, released when it unfreezes.",tip:"Freeze a boulder, smash it, and launch it at enemies."},{id:"cryonis",name:"Cryonis",glyph:"cryonis",from:"Keh Namut Shrine",what:"Raise pillars of ice from any water \u2014 platforms, cover, or a lift for gates and chests.",tip:"Make a pillar under yourself to rise out of deep water."},{id:"camera",name:"Camera",glyph:"camera",from:"Hateno Tech Lab",what:"Photograph creatures, items, and enemies to build the Hyrule Compendium.",tip:"Registered things can be located by Hyrule's photo trader later."}],pe=[{id:"combat",name:"Combat that keeps you alive",items:["Perfect Dodge: hop away the instant before a hit lands, then press Y for a flurry of free hits.","Parry: lock on and press A right as an attack connects \u2014 it even bounces Guardian lasers back.","Charged attack: hold Y. Each weapon type does something different (swords sweep all around you).","You don't have to fight everything. Running away is a totally valid, often smart, move."]},{id:"weapons",name:"Weapons break \u2014 that's the system",items:["Every weapon has durability and will shatter. Save your best gear for tough enemies and bosses.","When a weapon is about to break, throw it (R) at an enemy for big bonus damage, then swap.","Pick up everything dropped \u2014 you'll always be cycling through fresh weapons.","Farm arrows: block an archer's shots with a wooden shield and the arrows stick to it."]},{id:"survival",name:"Survival basics",items:["There are no hearts in grass or pots \u2014 you heal by eating, mostly cooked food. Always forage.","Cold zones drain hearts (Spicy food or the Warm Doublet fix it); deserts are hot, Death Mountain burns.","Smash black, sparkling ore deposits \u2014 ideally with a hammer weapon \u2014 for gems and flint.","Save often before risky climbs and fights so you can retry."]},{id:"explore",name:"Exploring Hyrule",items:["See a tower? Climb it. Towers reveal the map and give a high glide-off point.","Shrines give Spirit Orbs (4 = one heart or stamina upgrade) and become fast-travel points.","Glide from heights to cross huge distances fast \u2014 but mind your stamina wheel.","Korok seeds (900 of them) trade in to expand your inventory slots."]}],me=["One effect at a time. You can't combine two buffs in a dish \u2014 a Hearty + Spicy mix keeps only one. Cook each effect separately.","Stack the same type to make it stronger / last longer (e.g. 3 Spicy Peppers = longer cold resistance).","Use a cooking pot for multi-ingredient meals. A bare campfire only roasts single items.","Mixing monster parts WITHOUT a critter (or vice-versa) makes Dubious Food \u2014 edible but weak. Elixirs = critter + monster part.","Cooking near a Blood Moon, or adding a dragon part, triggers a 'critical' bonus."],ge=[{eff:"Spicy",tone:"warm",does:"Cold resistance \u2014 survive snowy areas like Mount Hylia.",key:"Spicy Pepper, Sunshroom, Warm Safflina",recipe:"Spicy Meat & Seafood Fry = Raw Meat + Spicy Pepper + Hyrule Bass",now:!0},{eff:"Chilly",tone:"cool",does:"Heat resistance \u2014 for the DESERT only, not Death Mountain.",key:"Chillshroom, Hydromelon, Cool Safflina, Cold Darner",recipe:"Chilly Steamed Fish = Hylian Shroom + Cool Safflina + Hyrule Bass"},{eff:"Fireproof",tone:"fire",does:"Flame guard \u2014 required for Death Mountain. Only works as an ELIXIR.",key:"Fireproof Lizard :root{--abyss:#091317;--panel:#0f1c22;--orange:#f0902a;--gold:#f2c14e;--cyan:#5fd6e2;--cyan-dim:#79b8c0;--moss:#9bc08a;--malice:#e0506b;--parch:#e9e2d2;--parch-dim:#a9b0ac;--ink-line:#33484f;--fire:#ff7a4d;--volt:#f2d44e;--heart:#ff6f8b;--atk:#ff9a5a;--def:#7fb4e8;--cool:#7fd6e8;--sneak:#a98ce0;}
*{box-sizing:border-box;}
.app{font-family:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:var(--parch);background:radial-gradient(120% 80% at 50% -10%,rgba(95,214,226,0.06),transparent 60%),radial-gradient(90% 70% at 80% 110%,rgba(240,144,42,0.05),transparent 60%),var(--abyss);min-height:100vh;max-width:560px;margin:0 auto;position:relative;padding-bottom:80px;overflow-x:hidden;}
.app:before{content:"";position:fixed;inset:0;pointer-events:none;opacity:0.5;background-image:radial-gradient(rgba(95,214,226,0.05) 1px,transparent 1px);background-size:22px 22px;mask-image:radial-gradient(120% 100% at 50% 0%,#000,transparent 75%);}
.topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:calc(12px + env(safe-area-inset-top,0px)) 16px 11px;background:linear-gradient(180deg,rgba(9,19,23,0.96),rgba(9,19,23,0.82));backdrop-filter:blur(8px);border-bottom:1px solid rgba(95,214,226,0.14);}
.brand{display:flex;align-items:center;gap:11px;}
.eye{color:var(--orange);filter:drop-shadow(0 0 6px rgba(240,144,42,0.45));animation:breathe 5s ease-in-out infinite;}
@keyframes breathe{0%,100%{opacity:.78;}50%{opacity:1;filter:drop-shadow(0 0 10px rgba(240,144,42,0.7));}}
.kicker{font-family:'Rajdhani',sans-serif;font-weight:600;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--cyan-dim);}
.title{font-family:'Cinzel',Georgia,serif;font-weight:600;font-size:19px;margin:0;letter-spacing:.5px;}
.region-chip{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:13px;letter-spacing:1px;color:var(--cyan);border:1px solid rgba(95,214,226,0.32);border-radius:20px;padding:5px 12px;}
.body{padding:14px 16px 0;position:relative;z-index:1;}
.loading{text-align:center;color:var(--cyan-dim);font-family:'Rajdhani',sans-serif;letter-spacing:2px;padding:60px 0;text-transform:uppercase;font-size:13px;}
.lede{color:var(--parch-dim);font-size:13.5px;line-height:1.6;margin:4px 2px 16px;}
.empty{color:var(--parch-dim);font-size:13.5px;padding:24px 6px;text-align:center;}
.footer-space{height:18px;}
.hero{display:flex;gap:18px;align-items:center;padding:6px 4px 18px;}
.hero-ring{width:104px;height:104px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;box-shadow:0 0 22px rgba(95,214,226,0.18);}
.hero-ring-in{width:84px;height:84px;border-radius:50%;background:var(--abyss);display:flex;flex-direction:column;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,0.06);}
.hero-pct{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:26px;color:var(--cyan);line-height:1;}
.hero-pct-l{font-family:'Rajdhani',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--parch-dim);margin-top:2px;}
.hero-side{flex:1;min-width:0;}
.hero-line{display:flex;align-items:baseline;gap:7px;margin-bottom:8px;}
.hero-num{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:21px;color:var(--parch);}
.hero-num-l{font-size:12.5px;color:var(--parch-dim);}
.hero-cont{width:100%;text-align:left;font-family:'Rajdhani',sans-serif;font-weight:600;font-size:13px;color:var(--orange);background:rgba(240,144,42,0.08);border:1px solid rgba(240,144,42,0.3);border-radius:10px;padding:9px 12px;cursor:pointer;margin-top:2px;}
.hero-done{font-family:'Rajdhani',sans-serif;font-weight:600;font-size:13px;color:var(--cyan);background:rgba(95,214,226,0.08);border:1px solid rgba(95,214,226,0.3);border-radius:10px;padding:9px 12px;}
.panel{border:1px solid rgba(255,255,255,0.07);border-radius:16px;background:linear-gradient(180deg,var(--panel),rgba(15,28,34,0.5));padding:14px 15px;margin-bottom:13px;}
.panel-h{font-family:'Rajdhani',sans-serif;font-weight:600;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--cyan-dim);margin-bottom:11px;}
.panel-note{font-size:12px;color:var(--parch-dim);line-height:1.5;margin:10px 0 0;}
.reg-row{display:flex;align-items:center;gap:10px;width:100%;background:none;border:none;cursor:pointer;color:inherit;padding:7px 0;}
.reg-ic{color:var(--cyan-dim);display:flex;flex-shrink:0;}
.reg-name{font-size:13.5px;color:var(--parch);flex-shrink:0;width:128px;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.reg-bar{flex:1;height:6px;border-radius:5px;background:rgba(255,255,255,0.06);overflow:hidden;}
.reg-fill{display:block;height:100%;border-radius:5px;transition:width .4s;}
.reg-count{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:11.5px;color:var(--orange);flex-shrink:0;width:38px;text-align:right;}
.reg-done{color:var(--cyan);}
.orb-row{display:flex;align-items:center;gap:12px;}
.orb-big{color:var(--cyan);filter:drop-shadow(0 0 7px rgba(95,214,226,0.5));}
.orb-count{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:22px;color:var(--cyan);}
.orb-count .dim{color:var(--parch-dim);font-weight:500;font-size:14px;}
.orb-sub{font-size:11.5px;color:var(--parch-dim);line-height:1.4;}
.rune-row{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;}
.rune-pip{display:flex;flex-direction:column;align-items:center;gap:6px;padding:10px 2px;border-radius:11px;border:1px solid rgba(255,255,255,0.06);color:var(--ink-line);background:rgba(255,255,255,0.02);}
.rune-pip span{font-family:'Rajdhani',sans-serif;font-weight:600;font-size:9.5px;letter-spacing:.2px;color:var(--parch-dim);}
.rune-on{color:var(--orange);border-color:rgba(240,144,42,0.4);background:rgba(240,144,42,0.07);}
.rune-on span{color:var(--parch);}
.champ-row{display:flex;flex-direction:column;gap:8px;}
.champ-pip{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:11px;border:1px solid rgba(255,255,255,0.06);color:var(--ink-line);background:rgba(255,255,255,0.015);}
.champ-on{color:var(--gold);border-color:rgba(242,193,78,0.35);background:rgba(242,193,78,0.06);}
.champ-txt{display:flex;flex-direction:column;}
.champ-name{font-size:13.5px;color:var(--parch);font-weight:600;}
.champ-on .champ-name{color:var(--gold);}
.champ-note{font-size:11px;color:var(--parch-dim);}
.big-link{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;font-family:'Rajdhani',sans-serif;font-weight:600;font-size:13px;letter-spacing:.5px;color:var(--cyan);background:rgba(95,214,226,0.06);border:1px solid rgba(95,214,226,0.25);border-radius:12px;padding:13px;cursor:pointer;}
.search{position:relative;margin:0 0 12px;}
.search-input{width:100%;padding:11px 38px 11px 14px;border-radius:12px;background:var(--panel);border:1px solid rgba(95,214,226,0.18);color:var(--parch);font-family:'Inter',sans-serif;font-size:14px;outline:none;}
.search-input::placeholder{color:#6f817f;}
.search-input:focus{border-color:rgba(95,214,226,0.5);box-shadow:0 0 0 3px rgba(95,214,226,0.1);}
.search-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--parch-dim);font-size:15px;cursor:pointer;padding:4px 8px;}
.regsel{display:flex;gap:7px;overflow-x:auto;margin:0 -16px 4px;padding:0 16px 12px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.regsel::-webkit-scrollbar{display:none;}
.regchip{flex-shrink:0;display:flex;align-items:center;gap:7px;font-family:'Rajdhani',sans-serif;font-weight:600;font-size:12.5px;letter-spacing:.3px;color:var(--parch-dim);background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:7px 13px;cursor:pointer;white-space:nowrap;}
.regchip-c{font-size:10.5px;color:var(--ink-line);font-weight:700;}
.regchip-on{color:var(--abyss);background:var(--cyan);border-color:var(--cyan);}
.regchip-on .regchip-c{color:rgba(9,19,23,0.6);}
.regchip-done:not(.regchip-on){color:var(--cyan);border-color:rgba(95,214,226,0.35);}
.regchip-done:not(.regchip-on) .regchip-c{color:var(--cyan-dim);}
.beast-banner{display:flex;align-items:center;gap:8px;margin:0 0 14px;padding:9px 13px;border-radius:11px;background:rgba(95,214,226,0.07);border:1px solid rgba(95,214,226,0.22);color:var(--cyan);font-family:'Rajdhani',sans-serif;font-weight:600;font-size:12.5px;letter-spacing:.4px;}
.beast-banner b{color:var(--parch);}
.map-wrap{margin:0 0 18px;border:1px solid rgba(95,214,226,0.16);border-radius:16px;background:linear-gradient(180deg,rgba(19,37,44,0.6),rgba(15,28,34,0.3));padding:8px 8px 4px;}
.map-svg{width:100%;height:auto;display:block;}
.map-label{fill:var(--parch-dim);font-family:'Rajdhani',sans-serif;font-size:9px;font-weight:600;letter-spacing:.5px;}
.map-cap{text-align:center;font-size:11px;color:var(--parch-dim);margin:2px 0 6px;font-family:'Rajdhani',sans-serif;letter-spacing:.5px;}
.ping{animation:ping 2.2s ease-out infinite;}
@keyframes ping{0%{opacity:.6;}100%{opacity:0;}}
.card{border:1px solid rgba(255,255,255,0.07);border-radius:16px;margin-bottom:12px;overflow:hidden;background:linear-gradient(180deg,var(--panel),rgba(15,28,34,0.55));transition:border-color .3s;}
.card-done{border-color:rgba(95,214,226,0.34);box-shadow:0 0 0 1px rgba(95,214,226,0.08),0 0 24px rgba(95,214,226,0.06);}
.card-head{width:100%;display:flex;align-items:center;justify-content:space-between;gap:10px;background:none;border:none;cursor:pointer;padding:15px 16px;text-align:left;color:inherit;}
.card-name{font-family:'Cinzel',Georgia,serif;font-weight:600;font-size:16.5px;line-height:1.25;}
.card-done .card-name{color:var(--cyan);}
.card-sub{font-family:'Rajdhani',sans-serif;font-weight:500;font-size:11.5px;letter-spacing:.8px;text-transform:uppercase;color:var(--parch-dim);margin-top:3px;}
.card-head-side{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.pips{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:12px;color:var(--orange);border:1px solid rgba(240,144,42,0.35);border-radius:20px;padding:2px 9px;}
.pips-done{color:var(--cyan);border-color:rgba(95,214,226,0.4);background:rgba(95,214,226,0.08);}
.chev{font-size:22px;color:var(--parch-dim);transition:transform .25s;line-height:1;}
.chev-open{transform:rotate(90deg);color:var(--cyan);}
.reward-banner{display:flex;align-items:center;gap:7px;margin:0 16px 6px;padding:7px 11px;border-radius:9px;background:rgba(95,214,226,0.07);border:1px solid rgba(95,214,226,0.2);color:var(--cyan);font-family:'Rajdhani',sans-serif;font-weight:600;font-size:12px;letter-spacing:.5px;}
.steps{list-style:none;margin:2px 0 8px;padding:0 14px 6px;}
.step{display:flex;gap:12px;padding:10px 4px;border-top:1px solid rgba(255,255,255,0.045);align-items:flex-start;}
.step:first-child{border-top:none;}
.box{flex-shrink:0;width:24px;height:24px;border-radius:7px;margin-top:1px;border:2px solid rgba(240,144,42,0.55);background:rgba(240,144,42,0.06);color:var(--abyss);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;}
.box:active{transform:scale(.9);}
.box-on{background:var(--cyan);border-color:var(--cyan);box-shadow:0 0 12px rgba(95,214,226,0.55);}
.dot{flex-shrink:0;width:9px;height:9px;border-radius:50%;margin-top:7px;}
.step-body{min-width:0;}
.tag{display:inline-block;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:9.5px;letter-spacing:1.2px;text-transform:uppercase;border:1px solid;border-radius:5px;padding:1px 6px;margin-right:7px;vertical-align:1.5px;opacity:.85;}
.step-text{font-size:14px;line-height:1.55;color:var(--parch);}
.k-warn .step-text{color:#f1b3bf;}
.k-tip .step-text{color:#bcd6da;}
.checked .step-text{color:var(--parch-dim);text-decoration:line-through;text-decoration-color:rgba(95,214,226,0.5);}
.step-items{display:flex;flex-wrap:wrap;gap:6px;margin-top:7px;}
.chip{font-family:'Rajdhani',sans-serif;font-weight:600;font-size:11px;letter-spacing:.3px;color:var(--gold);border:1px solid rgba(242,193,78,0.32);background:rgba(242,193,78,0.06);border-radius:6px;padding:2px 7px;}
.roadmap{margin-top:26px;}
.road-title{font-family:'Cinzel',Georgia,serif;font-weight:700;font-size:22px;margin:2px 0 6px;}
.road-note{color:var(--parch-dim);font-size:13px;line-height:1.6;margin:0;}
.road-card{display:flex;gap:14px;padding:14px 4px;border-top:1px solid rgba(255,255,255,0.07);}
.road-num{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:15px;color:var(--orange);opacity:.7;width:22px;flex-shrink:0;padding-top:2px;}
.road-name{font-family:'Cinzel',Georgia,serif;font-weight:600;font-size:15.5px;}
.road-sub{font-family:'Rajdhani',sans-serif;font-weight:500;font-size:11px;letter-spacing:.8px;text-transform:uppercase;color:var(--cyan-dim);margin:2px 0 6px;}
.road-text{font-size:13.5px;line-height:1.55;color:var(--parch-dim);margin:0 0 7px;}
.road-reward{font-family:'Rajdhani',sans-serif;font-weight:600;font-size:12.5px;color:var(--gold);letter-spacing:.3px;}
.ref{padding-top:2px;}
.ref-title{font-family:'Cinzel',Georgia,serif;font-weight:700;font-size:22px;margin:4px 0 6px;}
.ref-lede{color:var(--parch-dim);font-size:13.5px;line-height:1.6;margin:0 0 18px;}
.inv-cat{margin-bottom:18px;}
.inv-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;}
.inv-head-l{display:flex;align-items:center;gap:9px;font-family:'Cinzel',Georgia,serif;font-weight:600;font-size:15px;color:var(--parch);}
.inv-glyph{color:var(--orange);display:flex;}
.inv-count{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:12px;color:var(--orange);border:1px solid rgba(240,144,42,0.3);border-radius:20px;padding:2px 9px;}
.inv-count-done{color:var(--cyan);border-color:rgba(95,214,226,0.4);background:rgba(95,214,226,0.08);}
.inv-grid{display:flex;flex-direction:column;gap:8px;}
.item{display:flex;align-items:flex-start;gap:11px;text-align:left;width:100%;padding:11px 12px;border-radius:12px;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.015);cursor:pointer;opacity:.62;transition:all .25s;}
.item-on{opacity:1;border-color:rgba(95,214,226,0.3);background:rgba(95,214,226,0.05);box-shadow:0 0 16px rgba(95,214,226,0.06);}
.item-ic{flex-shrink:0;width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:var(--ink-line);background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);}
.item-on .item-ic{color:var(--cyan);border-color:rgba(95,214,226,0.3);filter:drop-shadow(0 0 6px rgba(95,214,226,0.3));}
.item-name{font-weight:600;font-size:14px;color:var(--parch);}
.item-note{font-size:12px;color:var(--parch-dim);margin-top:1px;line-height:1.4;}
.item-where{font-family:'Rajdhani',sans-serif;font-weight:600;font-size:10.5px;letter-spacing:.5px;text-transform:uppercase;margin-top:4px;color:var(--parch-dim);}
.item-on .item-where{color:var(--cyan);}
.rules{margin-bottom:18px;display:flex;flex-direction:column;gap:9px;}
.rule{display:flex;gap:9px;font-size:13px;line-height:1.5;color:var(--parch);}
.rule-dot{flex-shrink:0;width:7px;height:7px;border-radius:50%;background:var(--orange);margin-top:6px;box-shadow:0 0 6px rgba(240,144,42,0.5);}
.recipe{display:flex;gap:12px;padding:13px;border:1px solid rgba(255,255,255,0.07);border-radius:14px;margin-bottom:10px;background:linear-gradient(180deg,var(--panel),rgba(15,28,34,0.5));}
.recipe-now{border-color:rgba(240,144,42,0.4);box-shadow:0 0 18px rgba(240,144,42,0.07);}
.eff{flex-shrink:0;width:62px;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:12.5px;letter-spacing:.5px;text-align:center;padding:8px 4px;border-radius:9px;height:fit-content;border:1px solid;}
.eff-warm{color:var(--orange);border-color:rgba(240,144,42,0.4);background:rgba(240,144,42,0.08);}
.eff-cool{color:var(--cool);border-color:rgba(127,214,232,0.4);background:rgba(127,214,232,0.08);}
.eff-fire{color:var(--fire);border-color:rgba(255,122,77,0.4);background:rgba(255,122,77,0.08);}
.eff-volt{color:var(--volt);border-color:rgba(242,212,78,0.4);background:rgba(242,212,78,0.08);}

.recipe-body{min-width:0;}
.recipe-flag{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--orange);margin-bottom:4px;}
.recipe-does{font-size:13.5px;color:var(--parch);line-height:1.45;margin-bottom:6px;}
.recipe-key,.recipe-make{font-size:12.5px;color:var(--parch-dim);line-height:1.5;}
.recipe-key b,.recipe-make b{color:var(--cyan-dim);font-weight:600;}
.recipe-make{margin-top:3px;}
.seg{display:flex;gap:6px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:11px;padding:4px;margin-bottom:16px;}
.seg-btn{flex:1;font-family:'Rajdhani',sans-serif;font-weight:600;font-size:13px;letter-spacing:1px;text-transform:uppercase;color:var(--parch-dim);background:none;border:none;border-radius:8px;padding:9px;cursor:pointer;}
.seg-on{color:var(--abyss);background:var(--cyan);}
.rune-card{display:flex;gap:14px;padding:15px;border:1px solid rgba(255,255,255,0.07);border-radius:14px;margin-bottom:12px;background:linear-gradient(180deg,var(--panel),rgba(15,28,34,0.5));}
.rune-icon{flex-shrink:0;width:52px;height:52px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:var(--orange);background:rgba(240,144,42,0.08);border:1px solid rgba(240,144,42,0.25);filter:drop-shadow(0 0 6px rgba(240,144,42,0.25));}
.rune-cbody{min-width:0;}
.rune-top{display:flex;align-items:baseline;justify-content:space-between;gap:8px;flex-wrap:wrap;}
.rune-name{font-family:'Cinzel',Georgia,serif;font-weight:600;font-size:17px;}
.rune-from{font-family:'Rajdhani',sans-serif;font-weight:500;font-size:10.5px;letter-spacing:.8px;text-transform:uppercase;color:var(--cyan-dim);}
.rune-what{font-size:13.5px;line-height:1.55;color:var(--parch);margin:6px 0 6px;}
.rune-tip{font-size:13px;line-height:1.5;color:var(--gold);margin:0;}
.tip-card{padding:15px;border:1px solid rgba(255,255,255,0.07);border-radius:14px;margin-bottom:12px;background:linear-gradient(180deg,var(--panel),rgba(15,28,34,0.5));}
.tip-name{font-family:'Cinzel',Georgia,serif;font-weight:600;font-size:16px;color:var(--cyan);margin-bottom:8px;}
.tip-list{margin:0;padding-left:18px;}
.tip-list li{font-size:13.5px;line-height:1.6;color:var(--parch);margin-bottom:8px;}
.tip-list li::marker{color:var(--orange);}
.reset-zone{margin:22px 0 8px;text-align:center;}
.reset-btn{font-family:'Rajdhani',sans-serif;font-weight:600;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--parch-dim);background:none;border:1px solid rgba(255,255,255,0.12);border-radius:9px;padding:9px 16px;cursor:pointer;}
.reset-confirm{background:rgba(224,80,107,0.07);border:1px solid rgba(224,80,107,0.3);border-radius:12px;padding:13px;}
.reset-confirm span{display:block;font-size:13px;color:#f1b3bf;margin-bottom:10px;}
.reset-actions{display:flex;gap:8px;justify-content:center;}
.reset-yes{background:var(--malice);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-weight:600;font-size:13px;cursor:pointer;}
.reset-no{background:none;color:var(--parch-dim);border:1px solid rgba(255,255,255,0.14);border-radius:8px;padding:8px 16px;font-size:13px;cursor:pointer;}
.tabbar{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:560px;z-index:30;display:flex;justify-content:space-around;align-items:center;background:linear-gradient(180deg,rgba(9,19,23,0.82),rgba(9,19,23,0.98));backdrop-filter:blur(10px);border-top:1px solid rgba(95,214,226,0.16);padding:8px 4px calc(8px + env(safe-area-inset-bottom,0));}
.tab{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;color:var(--parch-dim);font-family:'Rajdhani',sans-serif;font-weight:600;font-size:10.5px;letter-spacing:.6px;padding:6px 8px;border-radius:12px;transition:color .2s;}
.tab-on{color:var(--cyan);}
.tab-on svg{filter:drop-shadow(0 0 7px rgba(95,214,226,0.6));}

.tab span{font-size:9.5px;}
.seg-scroll{overflow-x:auto;justify-content:flex-start;scrollbar-width:none;-webkit-overflow-scrolling:touch;}

.shrine-orbs .orbico{display:flex;color:var(--cyan);}
.shrine-bar{height:8px;}
.shrine-row .step-text{font-size:13.5px;}
.shrine-name{color:var(--parch);font-weight:600;}
.checked .shrine-name{color:var(--parch-dim);}
.shrine-loc{margin-top:5px;font-size:11.5px;color:var(--parch-dim);line-height:1.45;display:flex;align-items:flex-start;gap:5px;}
.shrine-loc svg{flex-shrink:0;margin-top:2px;opacity:.65;}
.shrine-q{color:var(--moss);}
.prio-pill{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:9.5px;letter-spacing:1px;text-transform:uppercase;border:1px solid;border-radius:20px;padding:2px 8px;}
.ref-line{font-size:12.5px;line-height:1.5;color:var(--parch-dim);margin:4px 0 0;}
.ref-line b{color:var(--cyan-dim);font-weight:600;}
.ref-tip{color:var(--gold);}
.tip-name{display:flex;align-items:center;gap:7px;}
.tower-reg{font-family:'Rajdhani',sans-serif;font-weight:500;font-size:10px;letter-spacing:.6px;text-transform:uppercase;color:var(--cyan-dim);margin-left:auto;}
.quest-group{margin-bottom:18px;}
.quest-region{font-family:'Cinzel',Georgia,serif;font-weight:600;font-size:15px;color:var(--cyan);margin:0 0 9px;}
.quest-card{padding:11px 12px;border:1px solid rgba(255,255,255,0.06);border-radius:11px;margin-bottom:8px;background:rgba(255,255,255,0.015);}
.quest-top{display:flex;align-items:baseline;justify-content:space-between;gap:8px;}
.quest-name{font-weight:600;font-size:13.5px;color:var(--parch);}
.quest-reward{font-family:'Rajdhani',sans-serif;font-weight:600;font-size:11px;color:var(--gold);flex-shrink:0;white-space:nowrap;}
.quest-line{font-size:12.5px;line-height:1.5;color:var(--parch-dim);margin:5px 0 0;}
.quest-giver{font-size:11px;color:var(--cyan-dim);margin:4px 0 0;font-style:italic;}
.bestiary-tier{margin-bottom:16px;}
.enemy-row{padding:9px 12px;border:1px solid rgba(255,255,255,0.06);border-radius:11px;margin-bottom:7px;background:rgba(255,255,255,0.015);}
.enemy-name{font-weight:600;font-size:13.5px;color:var(--parch);}
.enemy-tactic{font-size:12.5px;line-height:1.5;color:var(--parch-dim);margin:4px 0 0;}
.enemy-drops{font-size:11px;color:var(--gold);margin:3px 0 0;}
.korok-row{padding:9px 12px;border:1px solid rgba(255,255,255,0.06);border-radius:11px;margin-bottom:7px;background:rgba(255,255,255,0.015);}
.korok-type{font-weight:600;font-size:13px;color:var(--moss);}
.korok-how{font-size:12.5px;line-height:1.5;color:var(--parch-dim);margin:3px 0 0;}
.cook-extra{margin-top:18px;}
.gorecipe{padding:11px 12px;border:1px solid rgba(255,255,255,0.06);border-radius:11px;margin-bottom:8px;background:rgba(255,255,255,0.015);}
.gorecipe-name{font-weight:600;font-size:13.5px;color:var(--parch);}
.gorecipe-make{font-size:12.5px;color:var(--parch-dim);margin:4px 0 2px;}
.gorecipe-make b{color:var(--cyan-dim);}
.gorecipe-why{font-size:12px;color:var(--parch-dim);line-height:1.45;}
.dragon-row{padding:9px 12px;border:1px solid rgba(255,255,255,0.06);border-radius:11px;margin-bottom:7px;background:rgba(255,255,255,0.015);}
.dragon-name{font-weight:600;font-size:13.5px;color:var(--heart);display:flex;align-items:baseline;gap:8px;}
.dragon-el{font-family:'Rajdhani',sans-serif;font-weight:600;font-size:10.5px;letter-spacing:.5px;text-transform:uppercase;color:var(--cyan-dim);}

`)}const He={id:"vah_medoh",name:"Divine Beast Vah Medoh",sub:"Rito Village",kind:"beast",champion:"Revali's Gale",tagline:"The flying beast over Rito Village. Cold country \u2014 bundle up, pass Teba's archery test, and shoot it out of the sky.",sections:[{id:"md_reach",name:"Reach Rito Village",sub:"Tabantha \xB7 cold",steps:[{id:"md1",k:"warn",t:"Tabantha is a cold region. Bring cold resistance \u2014 the Snowquill set (sold in Rito Village) is the clean fix, or cook Spicy food."},{id:"md2",k:"step",t:"Warp to Tabantha Tower and glide northeast to Rito Village, built around a tall rock spire."},{id:"md3",k:"optional",t:"Activate the Akh Va'quot Shrine in the village for a warp point.",items:[{name:"Spirit Orb",cat:"key",note:"Akh Va'quot Shrine",orb:!0}]},{id:"md4",k:"loot",t:"Buy the Snowquill armor set from the village shop \u2014 strong cold resistance for the whole northwest.",items:[{name:"Snowquill Set",cat:"armor",note:"Cold resistance (Rito shop)"}]},{id:"md5",k:"step",t:"At the top, talk to Elder Kaneli \u2014 he asks you to help Teba take on Vah Medoh. Talk to Saki (next hut) to learn Teba is at the Flight Range."}]},{id:"md_teba",name:"Teba & the Flight Range",sub:"Archery test",steps:[{id:"md6",k:"warn",t:"The Flight Range is an even colder (level 2) area \u2014 make sure your cold resistance is solid before gliding over from Revali's Landing."},{id:"md7",k:"step",t:"Reach the Flight Range and talk to Teba. Agree to help. His test: hit 5 targets in 3 minutes using the updrafts to glide and shoot."},{id:"md8",k:"loot",t:"Pass the test for 20 Bomb Arrows and the Falcon Bow (long range \u2014 perfect for the boss).",items:[{name:"Falcon Bow",cat:"bow",note:"Long-range bow from Teba"},{name:"Bomb Arrows \xD720",cat:"material",note:"For Medoh's cannons"}]}]},{id:"md_attack",name:"Ground Vah Medoh",sub:"Ride Teba \xB7 4 cannons",steps:[{id:"md9",k:"step",t:"Talk to Teba to launch the assault. He flies you up alongside Medoh as it circles."},{id:"md10",k:"step",t:"Destroy the 4 cannons \u2014 one on each wing, one on the tail, one on the beak \u2014 with Bomb Arrows. They fire Guardian-style lasers; release the paraglider to drop and dodge, then re-open it."},{id:"md11",k:"step",t:"With all 4 cannons down, the barrier drops and Teba lands you on Medoh."}]},{id:"md_inside",name:"Inside Vah Medoh",sub:"Activate 5 terminals",reward:"Control of Vah Medoh",steps:[{id:"md12",k:"step",t:"Revali's intro: light 5 terminals, then the main control unit. Shoot the glowing Malice eyeballs to clear paths and deal with Guardian Scouts."},{id:"md13",k:"step",t:"The map terminal lets you TILT the whole beast. Rotate Medoh to redirect its built-in updrafts and walkways, then ride updrafts + paraglider to reach each terminal."},{id:"md14",k:"loot",t:"Grab the chests as you go (a Sapphire sits behind you at the tail when you board). You can't return after the boss.",items:[{name:"Sapphire",cat:"material",note:"Chest on Medoh's tail"}]}]},{id:"md_boss",name:"Boss: Windblight Ganon",sub:"Free Revali",reward:"Revali's Gale + Heart Container",steps:[{id:"md_b1",k:"step",t:"Phase 1: it floats and fires wind blasts and a laser. Use the updrafts on the arena to fly up and get slow-mo bow shots at its EYE (the Falcon Bow shines here); bomb arrows stun it. Hide behind pillars from the laser."},{id:"md_b2",k:"step",t:"Phase 2 (~50% HP): it summons floating turrets that bounce its laser. Ignore them (or Stasis the boss / shoot the reflectors) and keep hammering the eye, then flurry when it's stunned."},{id:"md_b3",k:"reward",t:"Beat it, GRAB the Heart Container, then activate the main control unit to free Revali. He grants Revali's Gale \u2014 hold jump for an updraft (3 charges), the best traversal power in the game. Speak to Kaneli for the Great Eagle Bow.",items:[{name:"Heart Container",cat:"key",note:"From Windblight Ganon"},{name:"Great Eagle Bow",cat:"bow",note:"Revali's bow \u2014 3 arrows at once (from Kaneli)"}]}]}]},Me={id:"vah_rudania",name:"Divine Beast Vah Rudania",sub:"Death Mountain \xB7 Goron City",kind:"beast",champion:"Daruk's Protection",tagline:"The salamander on Death Mountain. You'll need fireproofing and a Goron cannonball named Yunobo.",sections:[{id:"rd_reach",name:"Reach Goron City",sub:"Fireproofing first",steps:[{id:"rd1",k:"warn",t:"CRITICAL: Death Mountain is so hot it sets wooden weapons on fire and burns you without protection. Get the Flamebreaker armor (Southern Mine / Foothill Stable area) or carry Fireproof Elixirs BEFORE going up."},{id:"rd2",k:"step",t:"From Eldin Tower, ride the mine carts / follow the road up to Goron City. Talk to the boss, Bludo \u2014 but his back's gone out, so he sends you with his helper Yunobo."},{id:"rd3",k:"step",t:"Free Yunobo from the cave-in at the Abandoned North Mine (bomb the rocks). Bludo gives you Fireproof Elixirs and points you to the Bridge of Eldin."}]},{id:"rd_yunobo",name:"Yunobo the Cannonball",sub:"Bridge of Eldin",steps:[{id:"rd4",k:"step",t:"At the Bridge of Eldin, defeat the 2 Moblins bullying Yunobo (grab their drops fast before the heat burns them)."},{id:"rd5",k:"step",t:"Yunobo can curl up and use Daruk's Protection \u2014 so he survives being fired from a cannon. Hit the cannon's switch to aim it at the bridge, then launch Yunobo to lower it."}]},{id:"rd_climb",name:"Up Death Mountain",sub:"Cannon Yunobo at Rudania",steps:[{id:"rd6",k:"warn",t:"Vah Rudania patrols sentries (Guardian drones). If a sentry spots you OR Yunobo, Rudania triggers a magma rockslide that knocks you back. Hide under rocks and let them pass."},{id:"rd7",k:"step",t:"Climb the mountain counter-clockwise. Whistle (D-pad down) to tell Yunobo to follow or stay. At each cannon, aim and fire Yunobo at Rudania's 4 glowing weak points."},{id:"rd8",k:"step",t:"Four hits force Rudania to retreat into the crater \u2014 drop in and board it."}]},{id:"rd_inside",name:"Inside Vah Rudania",sub:"Activate 5 terminals",reward:"Control of Vah Rudania",steps:[{id:"rd9",k:"step",t:"Light 5 terminals, then the main control unit. Shoot Malice eyeballs, bomb obstacles, and use Magnesis on the metal blocks."},{id:"rd10",k:"step",t:"The map terminal ROTATES the whole beast (it walks on walls and the ceiling). Tilt Rudania 90\xB0 to reposition platforms, then paraglide across to the terminals. Grab Ice Arrow chests \u2014 they're gold for the boss.",items:[{name:"Ice Arrows",cat:"material",note:"Chests inside / North Mine \u2014 for the fire boss"}]}]},{id:"rd_boss",name:"Boss: Fireblight Ganon",sub:"Free Daruk",reward:"Daruk's Protection + Heart Container",steps:[{id:"rd_b1",k:"step",t:"Phase 1: it swings a massive flaming sword \u2014 jump sideways for vertical slashes, jump over horizontal ones (or just keep distance), and Flurry Rush after a dodge. Ice Arrows to the eye stun it and deal big damage."},{id:"rd_b2",k:"step",t:"Phase 2 (~50% HP): it floats up and charges a giant fireball \u2014 throw a Remote Bomb so the fireball SUCKS it in, then detonate to stun it. Follow with Ice Arrows to the eye, then melee."},{id:"rd_b3",k:"reward",t:"GRAB the Heart Container, then activate the main control unit to free Daruk. He grants Daruk's Protection \u2014 hold ZL for a shield that blocks 3 hits and reflects Guardian lasers. Back in Goron City, see Yunobo then Bludo for the Boulder Breaker.",items:[{name:"Heart Container",cat:"key",note:"From Fireblight Ganon"},{name:"Boulder Breaker",cat:"weapon",note:"Daruk's two-hander (from Bludo)"}]}]}]},ze={id:"vah_naboris",name:"Divine Beast Vah Naboris",sub:"Gerudo Desert",kind:"beast",champion:"Urbosa's Fury",tagline:"The camel in the sandstorm \u2014 the toughest beast and hardest blight. Disguise up, reclaim the Thunder Helm, and ride a sand seal.",sections:[{id:"nb_gerudo",name:"Forbidden City Entry",sub:"Gerudo Town \xB7 the vai outfit",steps:[{id:"nb1",k:"warn",t:"The desert is scorching by day and freezing by night \u2014 pack heat AND cold resistance (Chilly / Spicy food; Snowquill helps at night)."},{id:"nb2",k:"step",t:"Gerudo Town bars men. Buy the Gerudo (vai) outfit \u2014 Veil, Top, and Sirwal \u2014 for ~600 rupees from Vilia at Kara Kara Bazaar on the way in. Wear all three to get past the guards.",items:[{name:"Gerudo Vai Set",cat:"armor",note:"Disguise to enter Gerudo Town"}]},{id:"nb3",k:"step",t:"Inside, speak to Chief Riju. She'll help against Naboris \u2014 but you need the Thunder Helm, stolen by the Yiga Clan. Talk to Captain Teake for the hideout's location."}]},{id:"nb_yiga",name:"The Thunder Helm",sub:"Yiga Hideout \xB7 Master Kohga",steps:[{id:"nb4",k:"step",t:"Sneak through the Yiga Hideout (the Yiga love Mighty Bananas \u2014 drop one to lure a guard away). Getting spotted summons tough Yiga Blademasters."},{id:"nb5",k:"step",t:"At the end, fight Master Kohga. He hurls spiked iron balls \u2014 use Magnesis to grab the ball and smash him with it (or make him drop it on his own head)."},{id:"nb6",k:"loot",t:"Take the Thunder Helm from the chest and return it to Riju (she's on the 2nd floor now). She wears it and meets you at the lookout post south of town.",items:[{name:"Thunder Helm",cat:"key",note:"Blocks Naboris's lightning"}]}]},{id:"nb_attack",name:"Ground Vah Naboris",sub:"Sand seal \xB7 4 feet",steps:[{id:"nb7",k:"step",t:"You NEED a sand seal \u2014 rent one in town or catch a wild one. Ride to the lookout post; Riju gives you 20 Bomb Arrows."},{id:"nb8",k:"step",t:"Ride your sand seal alongside Riju, staying inside her Thunder Helm field to block the lightning. Shoot each of Naboris's 4 feet with Bomb Arrows \u2014 2 per foot, 8 hits total \u2014 to stun it."},{id:"nb9",k:"step",t:"Board Naboris while it's down."}]},{id:"nb_inside",name:"Inside Vah Naboris",sub:"Activate 5 terminals",reward:"Control of Vah Naboris",steps:[{id:"nb10",k:"warn",t:"Don't use metal weapons or shields in here \u2014 Naboris runs on electricity and they'll shock you."},{id:"nb11",k:"step",t:"Light 5 terminals, then the main control unit. Naboris is built from rotating cylinder sections \u2014 use the map terminal to spin them and align paths, and route the electric current through the conductors."},{id:"nb12",k:"tip",t:"The fiddly one is the 5th terminal \u2014 power it by placing the two metal balls on the two pedestals (use Magnesis to carry them up and drop them in)."}]},{id:"nb_boss",name:"Boss: Thunderblight Ganon",sub:"Free Urbosa",reward:"Urbosa's Fury + Heart Container",steps:[{id:"nb_b1",k:"step",t:"Phase 1: it's FAST and teleports. Bait its quick lunge and Flurry Rush; shoot to stun, then strike. Use NON-metal gear so its lightning doesn't fry you."},{id:"nb_b2",k:"step",t:"Phase 2 (~50% HP): it drops metal pillars and charges lightning. Grab a pillar with Magnesis so the lightning hits IT instead of you \u2014 that staggers Thunderblight; then flurry. Shock arrows help too."},{id:"nb_b3",k:"reward",t:"GRAB the Heart Container, then activate the main control unit to free Urbosa. She grants Urbosa's Fury \u2014 a charged lightning nova (3 charges). Re-don the vai outfit, see Riju, and claim the Scimitar of the Seven and Daybreaker shield. That's all four beasts \u2014 report to Impa to complete Free the Divine Beasts.",items:[{name:"Heart Container",cat:"key",note:"From Thunderblight Ganon"},{name:"Scimitar of the Seven",cat:"weapon",note:"Urbosa's blade (from Riju)"},{name:"Daybreaker",cat:"shield",note:"Gerudo shield (from Riju)"}]}]}]},Ce={id:"master_sword",name:"The Master Sword",sub:"Korok Forest",kind:"region",tagline:"The blade that seals the darkness. Optional \u2014 but you'll want it for Ganon. Needs 13 hearts.",sections:[{id:"ms_prep",name:"Get to 13 Hearts",sub:"The price of the blade",steps:[{id:"ms1",k:"warn",t:"Pulling the sword drains your health. You need at least 13 FULL red hearts (not temporary yellow ones) or Link dies mid-pull."},{id:"ms2",k:"step",t:"That's 10 heart upgrades beyond your starting 3 \u2014 i.e. 40 Spirit Orbs spent on hearts. If you sank orbs into stamina, swap them at the Horned Statue in Hateno Village (it trades hearts \u2194 stamina)."}]},{id:"ms_woods",name:"The Lost Woods",sub:"Follow the embers",steps:[{id:"ms3",k:"step",t:"Head to the Great Hyrule Forest (Woodland region, north of Hyrule Castle). Nearest tower: Woodland Tower. Enter the foggy Lost Woods."},{id:"ms4",k:"step",t:"First stretch: follow the lit torches. After the checkpoint (two torches and a carved face), light your own torch (or a wooden weapon)."},{id:"ms5",k:"step",t:"Stand still and watch which way the EMBERS blow off your flame \u2014 walk that direction, re-checking every few steps. If the fog turns bright white, you went wrong; backtrack. Follow the embers out into the Korok Forest."}]},{id:"ms_pull",name:"The Great Deku Tree",sub:"Claim the sword",steps:[{id:"ms6",k:"optional",t:"Activate Keo Ruug Shrine right by the Deku Tree so you can fast-travel here later instead of re-running the Lost Woods.",items:[{name:"Spirit Orb",cat:"key",note:"Keo Ruug Shrine",orb:!0}]},{id:"ms7",k:"reward",t:"Approach the pedestal and hold to pull. With 13 hearts, Link draws the Master Sword free. It never permanently breaks (it 'runs out' and recharges in ~10 min), hits 30 \u2014 and 60 against Ganon, Malice, and Guardians. At full health it fires a sword beam (hold R).",items:[{name:"Master Sword",cat:"weapon",note:"Seals the darkness \xB7 recharges, never breaks"}]}]}]},Ge={id:"destroy_ganon",name:"Destroy Ganon",sub:"Hyrule Castle",kind:"region",tagline:"The end. Storm Hyrule Castle, beat Calamity Ganon, then finish Dark Beast Ganon with the Bow of Light.",sections:[{id:"dg_prep",name:"Before You Go",sub:"Stack the deck",steps:[{id:"dg1",k:"tip",t:"Free all four Divine Beasts first \u2014 when you enter the Sanctum, each fires a laser that strips 1/8 of Ganon's HP, so he starts at HALF health."},{id:"dg2",k:"tip",t:"Bring: the Master Sword (60 dmg here), Ancient Arrows (huge damage / one-shot Guardians), a multishot bow (Great Eagle / Lynel), Hearty meals (full heal + bonus hearts), and a Fairy or two (auto-revive at 0 HP)."}]},{id:"dg_castle",name:"Hyrule Castle",sub:"Optional loot run",steps:[{id:"dg3",k:"warn",t:"The castle and Castle Town Ruins crawl with Guardians (Stalkers, Skywatchers) and Malice. Weave through laser spotlights; shoot eyeballs to unblock stairs; Ancient Arrows make Guardians trivial."},{id:"dg4",k:"loot",t:"Worth grabbing on the way up: the Royal Guard set and Royal weapons scattered inside \u2014 and the Hylian Shield (the best shield in the game) from a chest in the castle Lockup/dungeon.",items:[{name:"Hylian Shield",cat:"shield",note:"Best shield in the game (castle Lockup)"}]},{id:"dg5",k:"step",t:"Climb to the Sanctum at the top of the castle. Entering it triggers the Divine Beasts' lasers (if freed) and starts the fight."}]},{id:"dg_calamity",name:"Calamity Ganon",sub:"Phase 1 boss",steps:[{id:"dg6",k:"step",t:"Calamity Ganon uses all four Blights' moves \u2014 fire, water, wind, thunder, a flaming sword, and a laser. Flurry Rush its sword swings; deflect the laser back; shoot its glowing EYE to stun, then unload with the Master Sword and Ancient Arrows."},{id:"dg7",k:"step",t:"At critical HP it raises a shield that nullifies most attacks. Break it with Urbosa's Fury (lightning pierces it) or by deflecting its charged beam back \u2014 then finish it off."}]},{id:"dg_darkbeast",name:"Dark Beast Ganon",sub:"The final shot",steps:[{id:"dg8",k:"step",t:"Ganon flees onto Hyrule Field as a colossal Dark Beast. Zelda gives you the Bow of Light (unlimited Light Arrows). Shoot the glowing orange weak points on its body to expose the eyes.",items:[{name:"Bow of Light",cat:"bow",note:"Zelda's bow \u2014 unlimited Light Arrows"}]},{id:"dg9",k:"reward",t:"When it attacks, an updraft forms in front of it \u2014 glide up (or use Revali's Gale) and, in mid-air slow-mo, fire a Light Arrow into its huge eye. Land the final shot to end the Calamity. Roll credits \u2014 and if you found every memory, stay for the bonus scene."}]}]},R=[oe,re,ne,ie,se,He,Me,ze,Ce,Ge],ee=[{regionKey:"great_plateau",regionName:"Great Plateau",shrines:[{name:"Oman Au Shrine",location:"Northeast of the Great Plateau Tower, on the open plateau; the first shrine the Old Man sends you to.",category:"puzzle",oneLine:"Grants the Magnesis Trial. Use Magnesis to move the metal blocks and bridge the gaps to reach the monk.",shrineQuest:null},{name:"Ja Baij Shrine",location:"East side of the plateau, near the East Abbey ruins.",category:"puzzle",oneLine:"Grants the Bomb Trial (Remote Bombs). Use round and cube bombs to blast cracked walls and clear a path to the monk.",shrineQuest:null},{name:"Owa Daim Shrine",location:"Southeast of Mount Hylia's peak, atop a ledge just outside the mountain's freezing zone (no cold gear needed here).",category:"puzzle",oneLine:"Grants the Stasis Trial. Freeze the moving platform with Stasis, hit it to load momentum, then ride it across the gap.",shrineQuest:null},{name:"Keh Namut Shrine",location:"Northwest of Mount Hylia's peak, in the snowy freezing zone. Bring cold protection (warm food or the Warm Doublet) before heading up.",category:"puzzle",oneLine:"Grants the Cryonis Trial. Raise ice pillars from the water with Cryonis to make platforms and climb up to the monk.",shrineQuest:null}]},{regionKey:"dueling-peaks",regionName:"Dueling Peaks",shrines:[{name:"Ha Dahamar Shrine",location:"In the small pond just west of Dueling Peaks Stable, on the riverbank.",category:"puzzle",oneLine:"The Water Guides: use Cryonis to clear the entrance spikes, then raise ice on the waterfall wall to steer the orb, pinball-style, into its slot.",shrineQuest:null},{name:"Bosh Kala Shrine",location:"West of the Dueling Peaks Tower, just south of the East Post Ruins and west of Proxim Bridge, along the path in from the Great Plateau.",category:"puzzle",oneLine:"The Wind Guides You: open your paraglider in the updrafts from the fans to float across the gaps and reach the chest and altar.",shrineQuest:null},{name:"Ree Dahee Shrine",location:"In the valley between the twin peaks, just north of the Squabble River, between Dueling Peaks Tower and Dueling Peaks Stable.",category:"puzzle",oneLine:"Timing Is Critical: hit switches to tilt platforms and roll orbs into sockets, activating moving platforms; time your dashes across them.",shrineQuest:null},{name:"Toto Sah Shrine",location:"South of Dueling Peaks Stable across the twin bridges, behind a bombable wall along the river near Hickaly Woods.",category:"puzzle",oneLine:"Toto Sah Apparatus: use the Sheikah Slate to rotate the motion-control platforms into pathways and reach the monk's pedestal.",shrineQuest:null},{name:"Ta'loh Naeg Shrine",location:"On the hill directly north of Kakariko Village, up the steps; it's the village's main travel gate.",category:"combat",oneLine:"Ta'loh Naeg's Teaching: a combat tutorial \u2014 practice perfect dodge (flurry rush), perfect guard, and the charged spin attack against the Guardian Scout.",shrineQuest:null},{name:"Lakna Rokee Shrine",location:"East of Kakariko Village, revealed at the end of the Stolen Heirloom investigation.",category:"quest",oneLine:"Lakna Rokee's Blessing: recover Paya's stolen heirloom, then claim the orb. It's a free blessing once the quest reveals the shrine.",shrineQuest:"The Stolen Heirloom"},{name:"Shee Vaneer Shrine",location:"At the summit of the south twin peak, southeast of Dueling Peaks Tower.",category:"puzzle",oneLine:"Twin Memories: a mirrored orb puzzle \u2014 memorize the orb layout in its twin (Shee Venath) and replicate it here on the 5x5 grid.",shrineQuest:null},{name:"Shee Venath Shrine",location:"At the summit of the north twin peak, southeast of Dueling Peaks Tower.",category:"puzzle",oneLine:"Twin Memories: a mirrored orb puzzle \u2014 memorize the orb layout in its twin (Shee Vaneer) and replicate it here on the 5x5 grid.",shrineQuest:null},{name:"Hila Rao Shrine",location:"On the Floret Sandbar, an islet where the Hylia River meets Nabi Lake, northeast of Dueling Peaks Tower in West Necluda.",category:"quest",oneLine:"Drifting: first cross Magda's flower field without trampling a bloom to reveal the shrine; inside, use Cryonis on the flowing water.",shrineQuest:"Watch Out for the Flowers"}]},{regionKey:"hateno",regionName:"Hateno",shrines:[{name:"Myahm Agana Shrine",location:"On the hill at the east edge of Hateno Village, near the plot where you can buy a house.",category:"puzzle",oneLine:"Tilt-maze (Myahm Agana Apparatus): use motion controls to guide the ball, or flip the maze fully upside-down so the ball rolls across the flat back to the goal.",shrineQuest:null},{name:"Tahno O'ah Shrine",location:"On the East Necluda coast, near the shore northeast of the Hateno Ancient Tech Lab.",category:"blessing",oneLine:"Tahno O'ah's Blessing: no puzzle. Reach the out-of-the-way ledge by the cliffs, enter, and collect the free Spirit Orb from the monk.",shrineQuest:null},{name:"Jitan Sa'mi Shrine",location:"At the summit of Mount Lanayru, behind the Goddess Statue at the Spring of Wisdom.",category:"quest",oneLine:"Cold climb. Free corrupted Naydra by shooting all its glowing points, then offer a Naydra's Scale at the Goddess Statue to open the shrine (free orb inside).",shrineQuest:"The Spring of Wisdom"},{name:"Kam Urog Shrine",location:"Northeast of Fort Hateno, in a clearing of statues near a small graveyard south of the Lanayru Promenade.",category:"quest",oneLine:"Talk to Calip and call him 'doctor'. At night a statue's eyes glow purple by the headstones; shoot it with an arrow to raise the buried shrine.",shrineQuest:"The Cursed Statue"},{name:"Mezza Lo Shrine",location:"Northeastern East Necluda on Rabia Plain, near Kass's platform southeast of Lanayru Tower (across the Rutala River).",category:"quest",oneLine:"The Crowned Beast: hear Kass's verse, then tame and mount a Mountain Buck (stag) and ride it onto the nearby platform to raise the buried shrine.",shrineQuest:"The Crowned Beast"},{name:"Chaas Qeta Shrine",location:"Out in the Necluda Sea on tiny Tenoko Island, southeast of Hateno Village (visible from the coast).",category:"combat",oneLine:"A Major Test of Strength: raft or paraglide out to the island and beat the upgraded Guardian Scout for the orb and ancient gear.",shrineQuest:null},{name:"Dow Na'eh Shrine",location:"Along the Lanayru Promenade at the west edge of East Necluda, hidden behind a waterfall.",category:"puzzle",oneLine:"Three Boxes: find the hidden treasure boxes and set them on the matching pressure switches to open the gate to the monk.",shrineQuest:null}]},{regionKey:"lanayru",regionName:"Lanayru",shrines:[{name:"Kaya Wan Shrine",location:"Lanayru Wetlands, directly beside the west side of the Wetland Stable, northwest of Lanayru Tower",category:"puzzle",oneLine:"Shields From Water: use Cryonis to raise ice pillars across the water-filled chambers, navigating past a Guardian Scout to reach the monk.",shrineQuest:null},{name:"Daka Tuss Shrine",location:"On a small island in the Lanayru Wetlands, southwest of Lanayru Tower and north of Kakariko Village",category:"puzzle",oneLine:"Sunken Scoop: use Magnesis on the sunken metal bowl to scoop floating balls and drop them into the cages, then sink the bowl onto the switch.",shrineQuest:null},{name:"Sheh Rata Shrine",location:"On a small island in the Hylia River within the Lanayru Wetlands, reachable via an underwater path or raft",category:"puzzle",oneLine:"Speed of Light: spin the crank to rotate the laser onto the crystal switch, using Cryonis ice pillars to cross the water and reach platforms.",shrineQuest:null},{name:"Soh Kofi Shrine",location:"On a cliff just north of Lanayru Tower, near the path to Sidon's bridge; glide over from the tower top",category:"combat",oneLine:"A Minor Test of Strength: defeat the Guardian Scout II with sword and shield, dodging its spin and beam attacks; chest holds a Knight's Bow.",shrineQuest:null},{name:"Ne'ez Yohma Shrine",location:"In the center of Zora's Domain, below King Dorephan's throne room",category:"puzzle",oneLine:"Pushing Power: use Cryonis to shove the Ancient Orb across the sloped waterway into its slot while dodging the boulders rolling down.",shrineQuest:null},{name:"Dagah Keek Shrine",location:"Lanayru Great Spring, atop Veiled Falls near Zora's Domain (revealed by the shrine quest)",category:"quest",oneLine:"Blessing shrine revealed by the shrine quest; a free Spirit Orb and a chest with a Silver Rupee wait inside, no puzzle.",shrineQuest:"The Ceremonial Song"},{name:"Rucco Maag Shrine",location:"On the Samasa Plain in the Lanayru Great Spring, south of Zora's Domain, set within a stone-spike maze patrolled by Lizalfos",category:"puzzle",oneLine:"Five Flames: light all five torches on the floating cube and pillars with a torch, avoiding the water spout and keeping the flame above water.",shrineQuest:null},{name:"Kah Mael Shrine",location:"On Tingel Island, the northernmost island of the chain in the Lanayru Sea (far northeast), hidden under a stone slab",category:"puzzle",oneLine:"Drop and Rise: lift the slab with an Octo Balloon or Stasis to enter, then shoot the ropes so the cube drops on the scale and launches the barrel up.",shrineQuest:null},{name:"Shai Yota Shrine",location:"On a small island in Horon Lagoon in the Lanayru Sea, far east of the region (revealed by the shrine quest)",category:"quest",oneLine:"Free Spirit Orb: the monk grants the orb simply for reaching the shrine; the real challenge is the Master of the Wind quest outside.",shrineQuest:"Master of the Wind"}]},{regionKey:"lake",regionName:"Lake Hylia",shrines:[{name:"Ka'o Makagh Shrine",location:"On a high ledge a short climb up the hill just south of Highland Stable, overlooking the stable.",category:"puzzle",oneLine:"Trial 'Metal Doors Open the Way' \u2014 use Magnesis to move the metal doors and use them as ramps/bridges to reach the monk.",shrineQuest:null},{name:"Pumaag Nitae Shrine",location:"In the
