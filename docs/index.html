woods southeast of Lake Hylia, near the border of Pagos Woods and Finra Woods, a short trip from Lake Tower.",category:"combat",oneLine:"'A Minor Test of Strength' \u2014 defeat the Guardian Scout II (sword and shield); use Flurry Rush on its melee swings.",shrineQuest:null},{name:"Ishto Soh Shrine",location:"Atop a cliff west of Oseira Plains and east of Daval Peak, in the southwest of the Lake region.",category:"puzzle",oneLine:"Trial 'Bravery's Grasp' \u2014 set the portable laser on the moving platform to hit the crystal switch, then climb the raised ledges.",shrineQuest:null},{name:"Ya Naga Shrine",location:"In the center of Hylia Island, the large island in Lake Hylia; paraglide in from Lake Tower to the west.",category:"puzzle",oneLine:"Trial 'Shatter the Heavens' \u2014 use Stasis/Remote Bombs to drive the stone cube up its track and smash the blocks to launch up.",shrineQuest:null},{name:"Shae Katha Shrine",location:"Behind the Goddess Statue at the Spring of Courage, by Damel Forest north of the Zonai Ruins, southeast of Lake Hylia.",category:"quest",oneLine:"Blessing shrine \u2014 no inner puzzle. The door behind the Goddess Statue opens only after the shrine quest.",shrineQuest:"The Serpent's Jaws"},{name:"Shoqa Tatone Shrine",location:"Rises on Puffer Beach on the southern coast, south of Lake Tower, only after its shrine quest is solved.",category:"quest",oneLine:"Hidden until you finish the quest; once it surfaces, place the orb to raise it and walk in for the blessing \u2014 no inner puzzle.",shrineQuest:"Guardian Slideshow"}]},{regionKey:"faron",regionName:"Faron",shrines:[{name:"Shai Utoh Shrine",location:"Inside a cave behind a breakable rock wall at the base of Ubota Point, just behind Lakeside Stable.",category:"puzzle",oneLine:"Halt the Tilt: use Stasis to freeze the tilting platforms and climb up. You can also pin them with the metal chest via Magnesis.",shrineQuest:null},{name:"Shoda Sah Shrine",location:"Behind the waterfall flowing from Riola Spring, southeast in the Faron rainforest.",category:"puzzle",oneLine:"Impeccable Timing: load an orb in the launcher and hit the crystal switch when the moving platforms are farthest apart to land it in the receptacle.",shrineQuest:null},{name:"Yah Rin Shrine",location:"On the cliffs on the northwestern outskirts of Lurelin Village, East Necluda, overlooking the village.",category:"puzzle",oneLine:"A Weighty Decision: stand on one scale and use Magnesis to lift the metal cube high over the other scale, then drop it to launch yourself up.",shrineQuest:null},{name:"Muwo Jeem Shrine",location:"Atop Cape Cales, the cape overlooking the Necluda Sea in southeastern East Necluda, reached by gliding or climbing the cliffs.",category:"combat",oneLine:"A Modest Test of Strength: beat the Guardian Scout III. Dodge for flurry rushes and use the breakable stone pillars as cover or to stun it.",shrineQuest:null},{name:"Qukah Nata Shrine",location:"Rises from a mound in Calora Lake, atop a waterfall directly east of Faron Tower.",category:"quest",oneLine:"A Song of Storms: equip metal gear and stand on the mound in a thunderstorm so lightning strikes it, revealing the shrine; inside is a free orb.",shrineQuest:"A Song of Storms"},{name:"Kah Yah Shrine",location:"At the Palmorae Ruins, the curving spit of land east of Lurelin Village (a fragment sits out at Soka Point); revealed after restoring the broken monument.",category:"quest",oneLine:"Quick Thinking: carry a barrel onto the moving platform, crouch under the barriers, then set it on the far floor switch to open the gate.",shrineQuest:"A Fragmented Monument"},{name:"Korgu Chideh Shrine",location:"On Koholit Rock at the summit of Eventide Island, far southeast in the Necluda Sea.",category:"quest",oneLine:"Stranded on Eventide: stripped of gear, carry the three Ancient Orbs to their pedestals to raise the shrine; inside is a free orb.",shrineQuest:"Stranded on Eventide"},{name:"Tawa Jinn Shrine",location:"Buried on the eastern slope of Mount Taran, above Taran Pass on the Faron/East Necluda border; rises once the quest is done.",category:"quest",oneLine:"The Three Giant Brothers: take the Ancient Orb from each of the three Hinox on Mount Taran and place them in the pedestals to raise the shrine; inside is a free orb.",shrineQuest:"The Three Giant Brothers"}]},{regionKey:"central_hyrule",regionName:"Central Hyrule",shrines:[{name:"Kaam Ya'tak Shrine",location:"Directly southwest of Central Tower, at the base of Mount Daphnes just west of Windvane Meadow in Hyrule Field.",category:"puzzle",oneLine:"Trial of Power. Use Magnesis and Stasis to swing the hanging boulder, then time your sprint past the rolling spiked boulders.",shrineQuest:null},{name:"Rota Ooh Shrine",location:"At Outskirt Stable, in southwestern Central Hyrule along the road southwest of the Castle Town Ruins.",category:"puzzle",oneLine:"Passing of the Gates. Use Stasis and timing to slip past the spinning gates, and Magnesis metal blocks to bridge gaps and hit switches.",shrineQuest:null},{name:"Wahgo Katta Shrine",location:"Southeast Central Hyrule, right beside Riverside Stable near the Hylia River.",category:"puzzle",oneLine:"Metal Connections. Use Magnesis to move the metal crates and complete the circuit, building a path to the monk.",shrineQuest:null},{name:"Katah Chuki Shrine",location:"Southwest of Hyrule Castle, out in Hyrule Field near the Castle Town Ruins.",category:"combat",oneLine:"A Minor Test of Strength. Beat the Guardian Scout; flurry rush its swings and use the chest weapons to finish it quickly.",shrineQuest:null},{name:"Saas Ko'sah Shrine",location:"Inside Hyrule Castle at the Docks, on the northwest side where water leads into the castle. Light the central torch to raise the buried shrine.",category:"combat",oneLine:"A Major Test of Strength. Hardest Guardian Scout IV in the game; bring strong weapons, dodge for flurry rushes, lift the metal floor blocks with Magnesis for cover.",shrineQuest:null},{name:"Dah Kaso Shrine",location:"Under the Digdogg Suspension Bridge in southwestern Central Hyrule, near the Regencia River.",category:"combat",oneLine:"A Minor Test of Strength. Defeat the Guardian Scout with flurry rushes and the weapons it drops.",shrineQuest:null},{name:"Namika Ozz Shrine",location:"Northeast Central Hyrule in the Crenel Hills, hidden inside a large hollowed tree stump.",category:"combat",oneLine:"A Modest Test of Strength. Fight the stronger Guardian Scout III; flurry rush its spear and axe, then grab the Frostspear from the chest.",shrineQuest:null},{name:"Noya Neha Shrine",location:"North of Central Tower (east of Ridgeland Tower) on the island west of Hyrule Castle, in a cave behind thorny vines and a cracked wall.",category:"combat",oneLine:"A Minor Test of Strength. Burn the thorns, bomb the cracked wall to open the cave, then beat the Guardian Scout inside.",shrineQuest:null}]},{regionKey:"ridgeland",regionName:"Hyrule Ridge",shrines:[{name:"Maag No'rah Shrine",location:"Inside a cliff cave southwest of the Maritta Exchange Ruins; there's a Bokoblin camp with a tall lookout tower nearby - face south from the tower for the cracked rocks",category:"blessing",oneLine:`"Maag No'rah's Blessing" - no trial inside; blow open the cracked rocks on the cliff with a bomb arrow or remote bomb, climb in, and claim the orb.`,shrineQuest:null},{name:"Mogg Latan Shrine",location:"Atop Satori Mountain, southwest of Ridgeland Tower, south of Hyrule Ridge",category:"puzzle",oneLine:'"Synced Swing" - use Magnesis (and Stasis) to swing and steady the chained metal platforms, timing your jumps across the gaps to the monk.',shrineQuest:null},{name:"Zalta Wa Shrine",location:"In the Breach of Demise, right along the path just southeast of Ridgeland Tower",category:"puzzle",oneLine:'"Two Orbs to Guide You" - shoot the first orb into its slot, carry the freed orb onto the floor switch, then use the shock-launch platform to reach the altar.',shrineQuest:null},{name:"Mijah Rokee Shrine",location:"Southern part of Washa's Bluff, north of Satori Mountain past the Tamio River; Kass sits in a tree nearby",category:"mixed",oneLine:'Find Kass for "Under a Red Moon," then stand bare on the pedestal during a Blood Moon to raise it; inside is "A Modest Test of Strength" (Guardian Scout III).',shrineQuest:"Under a Red Moon"},{name:"Sheem Dagoze Shrine",location:"On a cliffside in the West Hyrule Plains, northwest of Jeddo Bridge overlooking the river; Kass is nearby",category:"quest",oneLine:'Solve "The Two Rings" - shoot one arrow through both stone rings to raise the shrine; inside, guide two Ancient Orbs down the ramps into their slots.',shrineQuest:"The Two Rings"},{name:"Toh Yahsa Shrine",location:"On Thundra Plateau, west of Ridgeland Tower",category:"quest",oneLine:'"Trial of Thunder" - use Stasis to knock the four colored orbs into their matching slots on the plateau to raise the shrine; inside is a short Magnesis puzzle.',shrineQuest:"Trial of Thunder"},{name:"Shae Loya Shrine",location:"On a ridge in Hyrule Ridge just south of Tabantha Bridge Stable",category:"puzzle",oneLine:'"Aim for the Moment" - ride the rotating platforms and shoot the eye switches with arrows at the right instant to open the gates to the monk.',shrineQuest:null}]},{regionKey:"tabantha",regionName:"Tabantha",shrines:[{name:"Akh Va'quot Shrine",location:"In Rito Village itself, on a separate stone spire reached by the wooden bridge near the top of the village's spiraling walkway.",category:"puzzle",oneLine:"Trial of the Windmills: raise the metal sail-fans into the wind so the propellers spin and move platforms; ride them up to reach the monk.",shrineQuest:null},{name:"Sha Warvo Shrine",location:"On Dronoc's Pass, the 'home' shrine of the Rito Flight Range, northwest of Rito Village past the Rito Stable path.",category:"puzzle",oneLine:"Path of Hidden Winds: paraglide above the floating fans to ride their updrafts up and across gaps; time your glides with the rotating walls.",shrineQuest:null},{name:"Tena Ko'sah Shrine",location:"At the head of the Ancient Columns, southwest of the Tabantha Great Bridge, reached up through the Rayne Highlands.",category:"combat",oneLine:"A Major Test of Strength: defeat a Guardian Scout IV. Use the pillars to block its spin charge, then combo it while it's staggered.",shrineQuest:null},{name:"Kah Okeo Shrine",location:"Far southwestern corner of the region, near the foot of the Rayne Highlands; the entrance sits beneath a movable stone platform.",category:"puzzle",oneLine:"Wind Guide: grab the Korok Leaf from the chest and fan the floating platforms across the wind currents to reach the monk.",shrineQuest:null},{name:"Voo Lota Shrine",location:"At Warbler's Nest, directly west of Rito Village near Dragon Bone Mire; it rises from the ground once the quest is done.",category:"quest",oneLine:"Complete the shrine quest to reveal it: cook Salmon Meuniere, then have the Rito sisters sing on the pedestals in the order the song dictates.",shrineQuest:"Recital at Warbler's Nest"},{name:"Bareeda Naag Shrine",location:"South of Rito Village at the base of Cuho Mountain, along the path from Rito Stable toward the Flight Range.",category:"quest",oneLine:"Learn the song (Bedoli then Laissa). At midday (~12:40) sun shines through a heart-shaped hole onto the pedestal; light a flame on it to reveal it.",shrineQuest:"The Ancient Rito Song"}]},{regionKey:"hebra",regionName:"Hebra",shrines:[{name:"Hia Miu Shrine",location:"Far northwestern corner of the map, at the base of the Icefall Foothills",category:"combat",oneLine:"A Major Test of Strength vs a Guardian Scout IV. Dodge its melee for flurry rushes; ancient/strong weapons end it fast. Chest holds a Sapphire.",shrineQuest:null},{name:"Goma Asaagh Shrine",location:"Behind ice chunks at the southwestern base of Hebra Peak",category:"combat",oneLine:"Major Test of Strength vs a Guardian Scout IV. Melt or smash the ice with fire/bombs to enter, then flurry-rush the scout.",shrineQuest:null},{name:"Mozo Shenno Shrine",location:"Inside a small cave under the Biron Snowshelf, in the Hebra Mountains",category:"combat",oneLine:"Major Test of Strength vs a Guardian Scout IV. Revealed by the shrine quest 'The Bird in the Mountains' (talk to Molli at Rito Village first).",shrineQuest:"The Bird in the Mountains"},{name:"Qaza Tokki Shrine",location:"In the center of the North Lomei Labyrinth, northeast of the Tabantha Tundra in the Hebra range",category:"quest",oneLine:"Solve the North Lomei Labyrinth maze to reach it; gliding from above makes navigation far easier. Grants Qaza Tokki's Blessing.",shrineQuest:"Trial on the Cliff"},{name:"Lanno Kooh Shrine",location:"West of Hebra Tower, just north of the Hebra Plunge",category:"blessing",oneLine:"A free blessing shrine - just walk in and claim the Spirit Orb (and the bonus chest).",shrineQuest:null},{name:"To Quomo Shrine",location:"Inside a cave at the center of the Hebra North Summit",category:"blessing",oneLine:"A blessing shrine; the work is reaching it through the freezing summit, not the puzzle. Grab the orb and bonus chest.",shrineQuest:null},{name:"Sha Gehma Shrine",location:"Northern edge of the North Tabantha Snowfield, west of the North Lomei Labyrinth",category:"puzzle",oneLine:"'Shift and Lock' - rotate and lock the moving floor/wall sections to build a path across to the monk.",shrineQuest:null},{name:"Shada Naw Shrine",location:"A few steps north of Selmie's Spot, high on the Hebra mountainside",category:"puzzle",oneLine:"Use Cryonis pillars on the water surfaces and Magnesis on metal to bridge the gaps and reach the altar.",shrineQuest:null},{name:"Rok Uwog Shrine",location:"At the north end of Pikida Stonegrove",category:"puzzle",oneLine:"Roll the giant boulder onto pressure switches; line up the ball drops to open each gate in turn.",shrineQuest:null},{name:"Maka Rah Shrine",location:"In a clifftop cavern near Lake Kilsie, northwest of Rito Village (enter via the cave under the cliff edge northeast of the lake's pier)",category:"puzzle",oneLine:"'Steady Thy Heart' - use Magnesis to steer the big spiked metal ball, smashing crates and clearing the path; grab the Diamond chest.",shrineQuest:null},{name:"Rin Oyaa Shrine",location:"Northeast of Hebra Tower, hidden under a rock near Snowfield Stable",category:"puzzle",oneLine:"Use the water wheels and Magnesis to move the metal blocks/balls onto switches; redirect the flow to open the gates.",shrineQuest:null},{name:"Dunba Taag Shrine",location:"In Tanagar Canyon, just southeast of Rito Stable, southwest of Hebra Tower",category:"puzzle",oneLine:"Use Stasis on the spinning cogwheel and on the stone ball/barrels (Stasis-golf) to whack them onto the switches and open each gate.",shrineQuest:null},{name:"Gee Ha'rah Shrine",location:"Northwest of Hebra Tower, just south of Kopeeki Drifts",category:"puzzle",oneLine:"A pinwheel/maze puzzle - rotate the wind-powered wheels to spin the maze walls and roll the ball to its goal.",shrineQuest:null}]},{regionKey:"woodland",regionName:"Great Hyrule Forest",shrines:[{name:"Keo Ruug Shrine",location:"At the base of the Great Deku Tree in Korok Forest, center of the Lost Woods.",category:"puzzle",oneLine:"Look to the stars: place each orb in the row matching how many times that constellation appears on the back wall (5-3-1-2, left to right).",shrineQuest:null},{name:"Mirro Shaz Shrine",location:"Just east of Woodland Stable near Pico Pond, on the eastern fringe of the Great Hyrule Forest by the road.",category:"puzzle",oneLine:"Tempered Power: line up behind the orb, freeze it with Stasis, then whack it with a sledgehammer to launch it straight into the slot.",shrineQuest:null},{name:"Monya Toma Shrine",location:"On Salari Hill on the western edge of the region, south of Serenne Stable.",category:"puzzle",oneLine:"Drawing Parabolas: shoot the crystal switch to aim the rotating launchers, then fire the orb through the arcing launchers into the caged receptacle.",shrineQuest:null},{name:"Daag Chokah Shrine",location:"Northwest of Korok Forest in the Lost Woods, revealed after the shrine quest.",category:"quest",oneLine:"Finish The Lost Pilgrimage by stealth-following the Korok Oaki through the Lost Woods without being spotted; free orb inside, no puzzle.",shrineQuest:"The Lost Pilgrimage"},{name:"Maag Halan Shrine",location:"In the Lost Woods east of Korok Forest, revealed after the shrine quest.",category:"quest",oneLine:"Complete The Test of Wood: cross the Lost Woods without breaking or unequipping the Forest Dweller's sword, shield, and bow; free orb inside.",shrineQuest:"The Test of Wood"},{name:"Kuhn Sidajj Shrine",location:"On the shore of Lake Saria in the southwest of the Lost Woods, revealed after the shrine quest.",category:"quest",oneLine:"Solve Trial of Second Sight: follow the Ogre Trees (use Magnesis on the metal boulders) and return the chest to the island tree; free orb inside.",shrineQuest:"Trial of Second Sight"},{name:"Ketoh Wawai Shrine",location:"Inside the pitch-dark Thyphlo Ruins, north of Korok Forest, revealed after the shrine quest.",category:"quest",oneLine:"Shrouded Shrine: light the bird statues with a torch to navigate, take the orb from the sleeping Hinox, set it on the pedestal; free orb inside.",shrineQuest:"Shrouded Shrine"},{name:"Rona Kachta Shrine",location:"At the back of the Forgotten Temple in Tanagar Canyon, far western edge of the region.",category:"blessing",oneLine:"Survive the Guardian gauntlet through the Forgotten Temple to reach the shrine behind the Goddess Statue; free orb, no inner puzzle.",shrineQuest:null}]},{regionKey:"eldin",regionName:"Eldin",shrines:[{name:"Mo'a Keet Shrine",location:"Atop a cliff just east of Foothill Stable, at the southern edge of Eldin Canyon.",category:"puzzle",oneLine:"Trial 'Metal Makes a Path'. Use Magnesis to slide the large metal blocks and build a bridge across the gaps to the monk.",shrineQuest:null},{name:"Sah Dahaj Shrine",location:"Eldin Canyon, hidden in a gorge directly north of Cephla Lake, near the road up Death Mountain.",category:"puzzle",oneLine:"Trial 'Power of Fire'. Light the torch from the flame and use it past fire jets; the chest sits behind a bombable cracked wall.",shrineQuest:null},{name:"Daqa Koh Shrine",location:"Off the Mountain Road to Death Mountain, east of Goron Hot Springs and shortly before the Bridge of Eldin.",category:"puzzle",oneLine:"Trial 'Stalled Flight'. Stand on the launching block and Stasis it the instant the connector links, holding the gate open to glide in.",shrineQuest:null},{name:"Qua Raym Shrine",location:"On a small islet in Goronbi Lake, west of Eldin Tower (hidden behind a rock in the lake).",category:"puzzle",oneLine:"Trial 'A Balanced Approach'. Burn the crate on the scale to lift it, grab the key from the chest, then Magnesis the metal box.",shrineQuest:null},{name:"Shae Mo'sah Shrine",location:"On a cliff in the northern part of Goron City, in Eldin Canyon.",category:"puzzle",oneLine:"Trial 'Swinging Flames'. Light a torch and ride the swinging and moving platforms to carry the flame and reach the monk.",shrineQuest:null},{name:"Shora Hah Shrine",location:"Beneath the crab-shaped Isle of Rabac, reached by riding a mine cart from the Abandoned North Mine.",category:"puzzle",oneLine:"Trial 'Blue Flame'. Carry the blue flame across gusts and gaps to light the braziers; use moving platforms to cross.",shrineQuest:null},{name:"Kayra Mah Shrine",location:"Revealed in the Abandoned North Mine area northeast of Goron City, dug out during the shrine quest.",category:"quest",oneLine:"Start 'A Brother's Roast' with Bladon in Goron City; bring Gonguron a grilled rock roast so he digs out the shrine.",shrineQuest:"A Brother's Roast"},{name:"Gorae Torr Shrine",location:"Atop Gut Check Rock, north of Death Mountain in northeastern Eldin.",category:"quest",oneLine:"Win Bayge's Gut Check Challenge: climb Gut Check Rock in under 3 minutes collecting 100+ rupees. A free blessing waits inside.",shrineQuest:"The Gut Check Challenge"},{name:"Tah Muhl Shrine",location:"Southwest of Foothill Stable, just north of Trilby Valley in Eldin Canyon (revealed via the quest).",category:"quest",oneLine:"Trial 'Passing the Flame'. Talk to Mayro about the stable painting, then stand where it was painted (south) to spot the shrine.",shrineQuest:"A Landscape of a Stable"}]},{regionKey:"akkala",regionName:"Akkala",shrines:[{name:"Dah Hesho Shrine",location:"On a cliff south of Tarrey Town overlooking Lake Akkala, just east of Akkala Tower and near Great Fairy Mija's fountain",category:"combat",oneLine:"A Minor Test of Strength. Beat the Guardian Scout II; dodge its axe swings for a flurry rush, or stun it with shock/ice arrows.",shrineQuest:null},{name:"Ze Kasho Shrine",location:"On a ridge above South Akkala Stable, central Akkala on the main road",category:"puzzle",oneLine:"Ze Kasho Apparatus. Use motion controls to tilt the platform so the floor spikes slide clear of your path, then cross the laser room.",shrineQuest:null},{name:"Katosa Aug Shrine",location:"Just east of East Akkala Stable, near the eastern edge of the region",category:"puzzle",oneLine:"Katosa Aug Apparatus. Use motion controls to swing the putter/hammer so it knocks the Ancient Orb across into the concave receptacle.",shrineQuest:null},{name:"Ke'nai Shakah Shrine",location:"In a cave on the southern cliffside facing Ulria Grotto, southeast Akkala; bomb the cracked rock to get in",category:"combat",oneLine:"A Modest Test of Strength. Bomb-arrow the cracked wall to enter, then beat the Guardian Scout III with flurry rushes and shock/ice arrows.",shrineQuest:null},{name:"Zuna Kai Shrine",location:"Atop a tall stone pillar in the left 'eye' of Skull Lake, far north Akkala (revealed after the shrine quest)",category:"quest",oneLine:"Quest 'The Skull's Eye': get the tip from Jerrin, then climb or paraglide to the pillar in Skull Lake's left eye. Inside is a free blessing.",shrineQuest:"The Skull's Eye"},{name:"Ritaag Zumo Shrine",location:"At the spiral tip of Rist Peninsula, far northeast Akkala coast (revealed after the shrine quest)",category:"quest",oneLine:"Quest 'Into the Vortex': carry the nearby Ancient Orb to the center of the Rist Peninsula spiral and set it in the pedestal. Free blessing inside.",shrineQuest:"Into the Vortex"},{name:"Tu Ka'loh Shrine",location:"On Lomei Labyrinth Island, the maze island off the far northeast Akkala coast (revealed after the shrine quest)",category:"quest",oneLine:"Quest 'Trial of the Labyrinth': cross the Guardian-filled maze (fire-arrow the Malice eye) to the shrine; free blessing, plus a Barbarian Helm chest.",shrineQuest:"Trial of the Labyrinth"},{name:"Tutsuwa Nima Shrine",location:"At the Spring of Power, central-east Akkala west of East Akkala Stable (revealed after the shrine quest)",category:"mixed",oneLine:"Quest 'The Spring of Power': offer a Shard of Dinraal's Scale at the spring to open it; inside is a Major Test of Strength vs a Guardian Scout IV.",shrineQuest:"The Spring of Power"}]},{regionKey:"gerudo",regionName:"Gerudo Highlands",shrines:[{name:"Sasa Kai Shrine",location:"Gerudo Highlands, southeast of Gerudo Tower",category:"combat",oneLine:"Sign of the Shadow: talk to Kass atop Gerudo Tower, then between 3\u20134PM stand on the pedestal SE of the tower and shoot an arrow at the sun.",shrineQuest:"Sign of the Shadow"},{name:"Joloo Nah Shrine",location:"Gerudo Highlands, buried on Mount Nabooru",category:"puzzle",oneLine:"Unearthed via the Test of Will quest. Inside, use motion controls to roll the cube and light every torch while dodging water spouts.",shrineQuest:"Test of Will"},{name:"Keeha Yoog Shrine",location:"Gerudo Highlands, above Vatorsa Snowfield east of Gerudo Summit",category:"blessing",oneLine:"Cliffside Etchings: Geggle at Tabantha Bridge Stable points out a thunderbolt etching \u2014 ride the updraft and hit it with a Shock Arrow.",shrineQuest:"Cliffside Etchings"},{name:"Kema Kosassa Shrine",location:"Gerudo Highlands, western end of Risoka Snowfield",category:"combat",oneLine:"A Major Test of Strength \u2014 a Guardian Scout IV rises from the floor. Bring strong weapons and cold protection (Snowquill).",shrineQuest:null},{name:"Kuh Takkar Shrine",location:"Gerudo Highlands, Vatorsa Snowfield at the base of Laparoh Mesa",category:"puzzle",oneLine:"The shrine is sealed in ice \u2014 melt it with any fire (Fire Arrow, torch, red-Chuchu jelly), then solve the ice-block puzzle inside.",shrineQuest:null},{name:"Sho Dantu Shrine",location:"Gerudo Highlands, along Karusa Valley",category:"mixed",oneLine:"A pedestal asks for a shining blue stone \u2014 break the nearby luminous-stone deposits and place a Luminous Stone on it to raise the shrine.",shrineQuest:null}]},{regionKey:"wasteland",regionName:"Gerudo Desert",shrines:[{name:"Daqo Chisay Shrine",location:"Gerudo Desert, just outside the gate of Gerudo Town",category:"puzzle",oneLine:"The Whole Picture: use Magnesis to lift and slot the metal panels so the wall image lines up, opening the path.",shrineQuest:null},{name:"Kay Noh Shrine",location:"Gerudo Desert, north of Gerudo Town near the Great Cliffs",category:"puzzle",oneLine:"Power of Electricity: chain the electrical orb and wires to power the gates and the launch mechanism to the altar.",shrineQuest:null},{name:"Jee Noh Shrine",location:"Gerudo Desert, east of Gerudo Town near Daqa Koh",category:"puzzle",oneLine:"On the Move: ride the moving platforms, using Stasis and timing to cross the gaps to the chest and monk.",shrineQuest:null},{name:"Hawa Koth Shrine",location:"Gerudo Desert, far southwest near the Great Fairy Fountain (Tera)",category:"puzzle",oneLine:"The Current Solution: route the rolling spheres and electric currents to power each gate in sequence.",shrineQuest:null},{name:"Misae Suma Shrine",location:"Gerudo Desert, revealed inside Gerudo Town",category:"blessing",oneLine:"A free blessing unlocked by helping out in Gerudo Town (cure Pokki's stomach trouble) \u2014 finish the errand, then claim the orb.",shrineQuest:null},{name:"Raqa Zunzo Shrine",location:"Gerudo Desert, far east near the East Gerudo Ruins",category:"blessing",oneLine:"Win the sand-seal race out on the eastern dunes (beat the target time) to reveal this blessing shrine.",shrineQuest:null},{name:"Dako Tah Shrine",location:"Gerudo Desert, southwest near the Seven Heroines",category:"quest",oneLine:"Electric Path: revealed via The Eye of the Sandstorm (Nobiro, Kara Kara Bazaar). Inside, guide the moving electric orb to power the gates.",shrineQuest:"The Eye of the Sandstorm"},{name:"Korsh O'hu Shrine",location:"Gerudo Desert, at the Seven Heroines statues",category:"quest",oneLine:"The Seven Heroines: read each statue's missing symbol and place the matching orbs on the correct pedestals.",shrineQuest:"The Seven Heroines"},{name:"Kema Zoos Shrine",location:"Gerudo Desert, northwest by the Statue of the Eighth Heroine",category:"puzzle",oneLine:"A Delayed Puzzle: face the swordswomen statues' pointing direction and time the launch ramp/ball to reach the altar.",shrineQuest:null},{name:"Dila Maag Shrine",location:"Gerudo Desert, center of the South Lomei Labyrinth (East Barrens)",category:"quest",oneLine:"The Desert Labyrinth: navigate the maze to its core for the blessing (the Barbarian Helm is nearby).",shrineQuest:"The Desert Labyrinth"},{name:"Suma Sahma Shrine",location:"Gerudo Desert, southeast corner just south of Mount Granajh",category:"quest",oneLine:"Secret of the Snowy Peaks: read the Mountain Peak Log, then at ~4PM follow the cold shadow cast on the peak to dig out the shrine.",shrineQuest:"Secret of the Snowy Peaks"},{name:"Tho Kayu Shrine",location:"Gerudo Desert, eastern dunes near the East Gerudo Ruins",category:"puzzle",oneLine:"Light all four unlit torches scattered around the buried site to make the shrine rise from the sand.",shrineQuest:null}]}],Ae=[{region:"Great Plateau",name:"Great Plateau Tower",location:"Center of the Great Plateau, just southeast of the Temple of Time. It's the first tower in the game and the one the Old Man points you to.",climbTip:"No thorns or Malice here, so it's a pure stamina climb. Rest on the angled struts and ledges to refill your wheel, then paraglide off the top to spot the four shrines."},{region:"Dueling Peaks",name:"Dueling Peaks Tower",location:"On the west bank of the Squabble River in West Necluda, just north of Dueling Peaks Stable, at the foot of the twin peaks.",climbTip:"Climb the rock ledges at the base, then scale the lattice, resting on the horizontal beams to recover stamina. No Guardians here, so take a calm, staged climb; eat a stamina meal if you're low."},{region:"Hateno",name:"Hateno Tower",location:"On a hill in central East Necluda, just northwest of Hateno Village and the road toward Fort Hateno.",climbTip:"Base is wrapped in burnable thorny vines and guarded by Bokoblins/Moblins. Burn the thorns (fire arrow or a flame) and climb fast, since they regrow within minutes."},{region:"Lanayru",name:"Lanayru Tower",location:"Rises out of the Lanayru Wetlands, north of Kakariko Village and east of the Dueling Peaks, on the road toward Zora's Domain",climbTip:"The base sits in a nest of Lizalfos and Wizzrobes. Easiest approach: climb the ladder to the lookout platform northwest of the tower and paraglide across to a high face, skipping most enemies. Lizalfos sleep at night, so attempt it after dark. Rain makes the stone slippery, so bring climbing-boost food or rest on ledges."},{region:"Lake Hylia",name:"Lake Tower",location:"On the small island in the middle of Lake Hylia, just north of the Bridge of Hylia in south-central Hyrule.",climbTip:"The tower base sits in open water, so glide in or swim across from the Bridge of Hylia. No Malice or thorns here, but stamina matters: top up stamina food before the climb. From the top you can paraglide west toward Hylia Island to reach Ya Naga."},{region:"Faron",name:"Faron Tower",location:"Rises from the Hill of Baltha, in the wooded highlands northeast of Lakeside Stable, overlooking the Faron rainforest and Calora Lake.",climbTip:"The tower is wrapped in thorny vines that damage you on contact. Burn them off with a fire arrow or torch, or hop between the bare stone gaps, then climb. Bring stamina food; it is a tall climb in humid heat."},{region:"Central Hyrule",name:"Central Tower",location:"On the edge of Hyrule Field just west of Hyrule Castle, in the open expanse near the Castle Town Ruins.",climbTip:"Ringed by Decayed Guardians and patrolled by Guardian Stalkers that laser you mid-climb. Approach from the south/west using ruins as cover, climb fast, and clear or distract the Guardians (or wear climbing/Ancient gear) first."},{region:"Hyrule Ridge",name:"Ridgeland Tower",location:"West-central Hyrule Ridge, set in a small lake; it faces east toward Thundra Plateau, west of the Central Tower region",climbTip:"The base lake holds Electric Wizzrobes and Electric Lizalfos that can shock you off the wall, so clear or avoid them first; rubber armor or shock-resist food helps. Climb the inner struts to dodge obstacles and pace your stamina."},{region:"Tabantha",name:"Tabantha Tower",location:"Atop Nero Hill in the Tabantha Frontier, northwest Hyrule, between Rito Village and the Hebra Mountains. Reach it up the snowy slope from the Tabantha Great Bridge.",climbTip:"Malice covers the base and lower walls. Burn the Malice eyeball spikes near Nero Hill, then climb the clean stone above. Bring warm gear or spicy food for the cold."},{region:"Hebra",name:"Hebra Tower",location:"Atop a rock spire in the Hebra Mountains, just southwest of Snowfield Stable / north of the Tabantha frontier, overlooking the frozen Hebra range",climbTip:"Bitter cold up here, so wear cold-resist gear or sip a spicy elixir before you start. The tower itself is climbable, but the smart play is to glide in from the higher peaks to the south/west rather than climb up from the freezing valley floor."},{region:"Great Hyrule Forest",name:"Woodland Tower",location:"In the swampy Military Training Camp, southeast of the Great Hyrule Forest and northeast of Hyrule Castle.",climbTip:"Clear the Bokoblin/Moblin camp first. Approach from higher ground to the east, glide in, and avoid the malice-soaked swamp at the base that drains stamina."},{region:"Eldin",name:"Eldin Tower",location:"Eldin Canyon, atop a rocky peak south of Death Mountain and north of Foothill Stable, overlooking the lava fields of the canyon.",climbTip:"No puzzle to solve, but the base sits in a lava field, so cross the rock bridges to reach it and rest on the platforms to refill stamina. The area is extreme heat, so wear Flamebreaker gear or drink a Fireproof Elixir before climbing."},{region:"Akkala",name:"Akkala Tower",location:"Central Akkala, on a rock spire rising from a Malice-soaked pool in the Akkala Wilds, not far north of South Akkala Stable, ringed by Guardians",climbTip:"The base sits in a Malice bog patrolled by Guardians. Approach from a rim with rock cover, dodge the beams, then climb a Malice-free face of the spire. Bring stamina food."},{region:"Gerudo Highlands",name:"Gerudo Tower",location:"On a tall spire in the Gerudo Highlands northeast of Gerudo Town, its base wrapped in thorns.",climbTip:"Burn the thorns at the base (Fire Arrow, torch, or a Bomb) before climbing, or paraglide in from the higher cliffs to the east."},{region:"Gerudo Desert",name:"Wasteland Tower",location:"On a rock spire in the Gerudo Desert, northwest of Divine Beast Vah Naboris, northeast of Gerudo Town and southwest of the Gerudo Great Skeleton.",climbTip:"Climb at night to avoid daytime heat damage, or wear Gerudo/heat-resist gear; bring stamina food since the spire is tall. Watch for hazards below."}],Be=[{name:"Cotera",region:"Dueling Peaks",location:"In the woods northeast of Kakariko Village (behind/up the path past Ta'loh Naeg Shrine), inside a giant flower bud.",cost:"100 rupees to open the bud the first time. Talk to Pikango first ('Find the Fairy Fountain') to learn her location."},{name:"Kaysa",region:"Tabantha",location:"On Piper Ridge, a ridge south of Nero Hill / Tabantha Tower in the Tabantha Frontier. Paraglide south from the top of Tabantha Tower to spot the flower bud below.",cost:"A Rupee offering that scales with how many Great Fairies you've already freed: 100, then 500, then 1,000, then 10,000 Rupees."},{name:"Mija",region:"Akkala",location:"In a colorful tree grove on a cliff just east/south of Akkala Tower, near Dah Hesho Shrine overlooking Lake Akkala",cost:"Costs rupees by unlock order across all four fairies (100, then 500, then 1,000, then 10,000); unlocking her enables higher armor upgrade tiers"},{name:"Tera",region:"Gerudo Desert",location:"Inside the rib cage of the Gerudo Great Skeleton at Dragon's Exile, far southwest corner of the Gerudo Desert, right next to Hawa Koth Shrine.",cost:"Up to 10,000 Rupees (the price scales with how many fairies you've already freed; Tera demands 10,000 if she is your fourth and last)."}],Fe=[{region:"Great Plateau",quests:[{name:"The Old Man's Diary (Warm Doublet)",giver:"The Old Man, via his diary in the Woodcutter's House near the Forest of Spirits",reward:"Warm Doublet (cold-resistance armor)",oneLine:"Read his diary, then cook the dish he forgot: Spicy Meat and Seafood Fry (Raw Meat + Spicy Pepper + Hyrule Bass), and he'll reward you."}]},{region:"Dueling Peaks",quests:[{name:"The Stolen Heirloom",giver:"Paya / Dorian (Kakariko Village)",reward:"Lakna Rokee Shrine (Spirit Orb)",oneLine:"Investigate the theft of the Sheikah heirloom from Impa's house, tail Dorian at night, and recover the orb \u2014 this reveals Lakna Rokee Shrine."},{name:"Watch Out for the Flowers",giver:"Magda (Floret Sandbar)",reward:"Hila Rao Shrine (Spirit Orb)",oneLine:"Cross Magda's flower field to the shrine without stepping on a single bloom, or she turns hostile \u2014 this reveals Hila Rao Shrine."},{name:"Find the Fairy Fountain",giver:"Pikango (Kakariko Village)",reward:"Reveals Cotera's location; Pikango then offers shrine location hints",oneLine:"Help the traveling painter find the nearby Great Fairy Fountain northeast of Kakariko to awaken Cotera; afterward he gives shrine-photo hints."},{name:"By Firefly's Light",giver:"Lasli (Kakariko Village, at night)",reward:"Rupees",oneLine:"Catch and deliver 5 Sunset Fireflies to Lasli, who misses chasing them at night."},{name:"Cucco Conundrum",giver:"Cado (Kakariko Village)",reward:"Rupees",oneLine:"Round up Cado's escaped Cuccos and return all 10 to the pen near the chief's house."}]},{region:"Hateno",quests:[{name:"The Statue's Bargain",giver:"Teebo (boy in Hateno Village; Horned Statue on the village outskirts)",reward:"Ability to swap hearts/stamina (net 20-rupee fee per swap)",oneLine:"Pray to the Horned Statue to sell back a Heart Container or Stamina Vessel for 100 rupees, then rebuy for 120 to re-spec hearts vs stamina."},{name:"The Sheep Rustlers",giver:"Koyin (sheep keeper at Hateno Pasture)",reward:"10 bottles of Fresh Milk",oneLine:"Clear the Bokoblins menacing the herd, then drive the three loose sheep back into the pen at Hateno Pasture before time runs out."},{name:"The Weapon Connoisseur",giver:"Nebb (boy in Hateno Village)",reward:"Rupees per weapon, plus a Diamond on completion",oneLine:"Long quest: show Nebb 8 specific named weapons (Soldier's Broadsword, Knight's gear, etc.) one at a time over many visits."},{name:"A Gift for My Beloved",giver:"Manny (boy near the inn in Hateno Village)",reward:"Rupees",oneLine:"Find out innkeeper Prima's favorite drink for the lovestruck Manny, then bring her the right gift to win her over."},{name:"Slated for Upgrades",giver:"Purah (Hateno Ancient Tech Lab)",reward:"Sheikah Slate rune upgrades",oneLine:"After the lab is powered (Locked Mementos), bring Purah ancient materials and she powers up your Sheikah Slate runes (sensor, camera, etc.)."},{name:"Robbie's Research",giver:"Purah (Hateno Ancient Tech Lab; sends you to Robbie at Akkala)",reward:"3 Ancient Arrows and access to Akkala Tech Lab research",oneLine:"Purah sends you to find Robbie at the Akkala Ancient Tech Lab; show him your scars to prove who you are and unlock ancient-tech crafting."}]},{region:"Lanayru",quests:[{name:"Frog Catching",giver:"Tumbo (Zora child near the inn and general store, Zora's Domain)",reward:"Armoranth",oneLine:"Bring Tumbo five Hot-Footed Frogs caught around the Domain's pools and waterfalls."},{name:"Luminous Stone Gathering",giver:"Ledo (Zora at the entrance just past the bridge into Zora's Domain)",reward:"Diamonds (2 for the first 10 stones, then 1 per 10)",oneLine:"Mine Luminous Stones from nearby cliffs and hand them to Ledo in batches of ten."},{name:"Lynel Safari",giver:"Laflat (by the bridge at the eastern end of Zora's Domain)",reward:"Rupees",oneLine:"Sneak a photo of the Lynel roaming Ploymus Mountain with the camera rune and bring it back to Laflat."},{name:"Diving is Beauty!",giver:"Gruve (Zora on an upper level by a waterfall in Zora's Domain)",reward:"5 Fleet-Lotus Seeds",oneLine:"Perform a beautiful dive off the high platform into the water below, then report to Gruve."},{name:"Zora Stone Monuments",giver:"Jiahto (Zora historian on the floor below the throne room, Zora's Domain)",reward:"Diamond (on completion)",oneLine:"Read all ten Zora Stone Monuments scattered around Zora's Domain and Vah Ruta's region, then report back to Jiahto."}]},{region:"Lake Hylia",quests:[{name:"The Horseback Hoodlums",giver:"Perosa (Highland Stable)",reward:"Endura Carrot",oneLine:"Perosa asks you to drive off the Blue Bokoblins riding horses around the stable; defeat the five mounted Bokoblins on Fural Plain."},{name:"The Serpent's Jaws",giver:"Kass (in the Pagos Woods near the Spring of Courage)",reward:"Access to Shae Katha Shrine (Thunderspear chest + Spirit Orb)",oneLine:"Solve Kass's verse: drop a Farosh's Scale into the Spring of Courage to open the door behind the Goddess Statue to Shae Katha."},{name:"Guardian Slideshow",giver:"Loone (Puffer Beach)",reward:"Access to Shoqa Tatone Shrine (Spirit Orb)",oneLine:"Photograph three Guardian types (Scout, Skywatcher, Stalker) for Loone; she gives you her orb 'Roscoe' to raise Shoqa Tatone Shrine."}]},{region:"Faron",quests:[{name:"Thunder Magnet",giver:"Cima, at Lakeside Stable",reward:"Rubber Helm",oneLine:"Lightning keeps hitting the stable. Climb to the roof and use Magnesis to pull out the metal Woodcutter's Axe lodged in the wooden horse head."},{name:"Take Back the Sea",giver:"Sebasto, in Lurelin Village",reward:"Silver Rupee",oneLine:"Monsters have overrun Aris Beach east of the village. Clear out every enemy in the stronghold there, then report back to Sebasto."},{name:"The Hero's Cache",giver:"Kass, on a stone pillar at Kitano Bay (east Faron coast)",reward:"Gold Rupee",oneLine:"Solve Kass's riddle '17 of 24': at 5 PM the pillar's shadow points to a chest in the water. Pull it up with Magnesis to claim the cache."}]},{region:"Central Hyrule",quests:[{name:"The Royal White Stallion",giver:"Toffa at Outskirt Stable",reward:"Royal Saddle and Royal Bridle",oneLine:"Tame the pure-white royal horse roaming near Safula Hill and register it at the stable to claim the royal gear."},{name:"My Hero",giver:"Aliza, standing under the trees across the road from Outskirt Stable",reward:"Star Fragment",oneLine:"Show Aliza the Master Sword (you must already have pulled it) to prove you are the hero she's waiting for."},{name:"A Rare Find",giver:"Trott at Outskirt Stable",reward:"Silver Rupee (300 rupees)",oneLine:"Trott is sick of vegetarian meals; bring him fresh Raw Gourmet Meat (from Hebra/Gerudo wildlife) for his reward."},{name:"A Royal Recipe",giver:"Gotter at Riverside Stable",reward:"Silver Rupee (300 rupees); a second cake earns another",oneLine:"Cook the royal kitchen's Fruitcake (or Monster Cake) and bring it to Gotter; the recipes are in Hyrule Castle's library."},{name:"The Royal Guard's Gear",giver:"Parcy at Riverside Stable",reward:"300 Rupees",oneLine:"Parcy wants to see Royal Guard equipment; retrieve any Royal Guard armor piece from Hyrule Castle and show it to her."}]},{region:"Hyrule Ridge",quests:[{name:"A Gift for the Great Fairy",giver:"Toren, at Tabantha Bridge Stable",reward:"Access to Great Fairy Kaysa's fountain (armor upgrades)",oneLine:"Toren hands you his 500-rupee life savings to wake the Great Fairy; carry it southwest to Kaysa's fountain on Piper Ridge and pay her to open it."},{name:"Misko, the Great Bandit",giver:"Domidak and Prissen at Dueling Peaks Stable",reward:"Misko's hidden treasure (rupees and gear)",oneLine:"Started at Dueling Peaks Stable, but the clue points to ruined pillars where Rayne, Piper, and Tanagar meet in Hyrule Ridge - dig there for the stash."}]},{region:"Tabantha",quests:[{name:"A Gift for the Great Fairy",giver:"Toren, at Tabantha Bridge Stable",reward:"The revived Great Fairy Fountain (you keep the 500 Rupees if Kaysa is already free)",oneLine:"Toren gives you 500 Rupees to offer Great Fairy Kaysa; find her fountain on Piper Ridge south of Tabantha Tower and revive her."},{name:"The Spark of Romance",giver:"Jogo, in Rito Village",reward:"Purple Rupee (50 Rupees)",oneLine:"Bring Jogo a piece of flint so he can light a fire and bake apples for his wife."},{name:"The Apple of My Eye",giver:"Juney, in Rito Village",reward:"Mighty Bananas",oneLine:"Cook and deliver a Baked Apple to Juney so she can keep up her offering at the Goddess statue."},{name:"Find Kheel",giver:"Amali, in Rito Village",reward:"Rupees; also unlocks the Recital at Warbler's Nest shrine quest",oneLine:"Track down Amali's missing daughter Kheel; she has flown off to Warbler's Nest with her sisters."},{name:"Face the Frost Talus",giver:"Gesane, in Rito Village",reward:"Purple Rupee (50 Rupees)",oneLine:"Defeat the Frost Talus out in the Hebra/Tabantha mountains, then report back to Gesane."}]},{region:"Hebra",quests:[{name:"Stalhorse: Pictured!",giver:"Juannelle (Snowfield Stable)",reward:"Silver Rupee (100 Rupees)",oneLine:"Photograph a Stalhorse - they appear at night in the North Tabantha Snowfield - then show Juannelle the picture."},{name:"Snowball Bowling",giver:"Pondo (Pondo's Lodge, northeast of Hebra Tower)",reward:"Blizzard Rod for a first-throw strike (Gold Rupee on later strikes/full inventory)",oneLine:"Pay 20 rupees to roll a giant snowball down the slope at the totem 'pins'; a first-ball strike is the goal."}]},{region:"Great Hyrule Forest",quests:[{name:"The Korok Trials",giver:"Chio (Great Deku Tree, Korok Forest)",reward:"3 Big Hearty Truffles",oneLine:"Chio asks you to clear three forest shrine quests: Trial of Second Sight, The Lost Pilgrimage, and The Test of Wood."},{name:"Riddles of Hyrule",giver:"Walton (asleep atop the Great Deku Tree, Korok Forest)",reward:"A Diamond (after all five riddles)",oneLine:"Solve Walton's five riddles by dropping the right item on the leaf before him: apple, fortified pumpkin, sunshroom, voltfin trout, Lynel hoof."}]},{region:"Eldin",quests:[{name:"Fireproof Lizard Roundup",giver:"Kima (Southern Mine, southwest of Goron City)",reward:"Flamebreaker Armor (the chest piece of the heat-resistant set)",oneLine:"Catch and deliver 10 Fireproof Lizards to Kima to help the injured miners; he takes them in batches."},{name:"The Road to Respect",giver:"Fugo (Goron City)",reward:"100 Rupees (plus the gems the Igneo Talus drops)",oneLine:"Defeat the Igneo Talus at Darunia Lake that the blacksmith's apprentice Fugo couldn't beat, then report back to him."},{name:"Death Mountain's Secret",giver:"Dugby (Goron Hot Springs, daytime)",reward:"A Drillshaft",oneLine:"Find Dugby's hidden weapon along the path to the Bridge of Eldin, behind a bombable cracked wall above the lava falls."},{name:"The Jewel Trade",giver:"Ramella (Goron City)",reward:"Amber Earrings (jewelry that boosts defense)",oneLine:"Bring the gem collector Ramella 10 pieces of Amber while she tours Goron City."}]},{region:"Akkala",quests:[{name:"From the Ground Up",giver:"Hudson (Bolson Construction; met during 'Hylian Homeowner' in Hateno, then sent to Akkala)",reward:"Builds Tarrey Town (general store, dye shop, ongoing supplies) and a wedding scene",oneLine:"Send Hudson to Akkala, then recruit residents whose names end in 'son' to build Tarrey Town from scratch around the lakeside."},{name:"The Spring of Power",giver:"Nobo at East Akkala Stable",reward:"Reveals Tutsuwa Nima Shrine",oneLine:"Take the legend to the Spring of Power and offer a Shard of Dinraal's Scale to the goddess statue to reveal Tutsuwa Nima Shrine."},{name:"The Skull's Eye",giver:"Jerrin at the Akkala Ancient Tech Lab",reward:"Reveals Zuna Kai Shrine",oneLine:"Reach the Ancient Shrine atop the pillar in Skull Lake's left eye to reveal Zuna Kai Shrine."},{name:"Into the Vortex",giver:"Stone tablet at the base of Rist Peninsula (auto-logged when read)",reward:"Reveals Ritaag Zumo Shrine",oneLine:"Carry the nearby Ancient Orb to the center of the Rist Peninsula spiral and place it to make Ritaag Zumo Shrine rise."},{name:"Trial of the Labyrinth",giver:"Auto-logged on reaching Lomei Labyrinth Island",reward:"Reveals Tu Ka'loh Shrine; Barbarian Helm in the shrine chest",oneLine:"Navigate the Guardian-filled northeast maze and burn the Malice eye to reach Tu Ka'loh Shrine; a Barbarian Helm chest sits inside the shrine."}]},{region:"Gerudo Desert",quests:[{name:"The Search for Barta",giver:"Liana (Gerudo Town barracks)",reward:"Counts toward the Thunder Helm",oneLine:"Find the missing guard Barta, hiding near the Gerudo Great Skeleton, and report back to Liana."},{name:"Tools of the Trade",giver:"Isha (Gerudo Town jewelry shop)",reward:"Reopens the jewelry shop; counts toward the Thunder Helm",oneLine:"Bring Isha 10 Flint so she can get her jewelry stand running again."},{name:"Medicinal Molduga",giver:"Malena (Gerudo Town soldier training courtyard)",reward:"Gold Rupee; counts toward the Thunder Helm",oneLine:"Bring Malena Molduga Guts to treat her sick husband; fight the Molduga from a rock or ledge with bombs."},{name:"The Mystery Polluter",giver:"Dalia (Gerudo Town)",reward:"Counts toward the Thunder Helm",oneLine:"Follow the trail of Hydromelon rinds to Calyban on the wall by the water, who is polluting Dalia's garden, and get her to stop."},{name:"The Secret Club's Secret",giver:"Begins on trying to enter the Gerudo Secret Club (Greta's shop)",reward:"Access to the Gerudo Secret Club (sells Desert Voe and Radiant sets)",oneLine:"Eavesdrop at The Noble Canteen to learn the password 'GSC' (plus a diamond) and gain entry. Optional; not needed for the Thunder Helm."},{name:"The Thunder Helm",giver:"Chief Riju (Gerudo Town palace)",reward:"Thunder Helm (lightning immunity)",oneLine:"Complete the four Gerudo Town favors (Barta, Tools of the Trade, Medicinal Molduga, Mystery Polluter), then Riju lends you the Thunder Helm."},{name:"The Eighth Heroine",giver:"Bozai (outside Gerudo Town's gate, near Daqo Chisay Shrine)",reward:"Sand Boots (faster movement on sand)",oneLine:"Wearing the Gerudo outfit, photograph the Statue of the Eighth Heroine in the snowy Gerudo Highlands for Bozai. He lends Snow Boots to help."},{name:"The Forgotten Sword",giver:"Bozai (Gerudo Town, follow-up after The Eighth Heroine)",reward:"Snow Boots (faster movement on snow)",oneLine:"After The Eighth Heroine, find the heroine's missing sword on the snowfield near her statue and report back to Bozai."}]}],De={sets:[{name:"Champion's Tunic",pieces:"1 (body only)",where:"Given by Impa in Kakariko Village after recovering your first memory (Captured Memories); the blue tunic Zelda made for Link.",bonus:"No set bonus. Unique effect: displays exact enemy HP numbers when equipped. Strong base defense (highest single piece when fully upgraded).",upgrade:"Silver/Gold Lynel parts at higher stars (Lynel Hoof, Horn, Guts) plus rupees. No matching pieces, so it never grants a set bonus.",priority:"mid"},{name:"Hylian Set",pieces:"3 (Hood, Tunic, Trousers)",where:"Bought cheaply early on. Tunic/Trousers from Enchanted (Kakariko) and Ventest Clothing Boutique (Hateno); the Hood from those same armor shops.",bonus:"No set bonus. Just solid, cheap all-around defense for beginners. The Hood gives no environmental resistance, only defense.",upgrade:"Bokoblin parts (Bokoblin Horn, Fang, Guts) at low tiers, the most common monster drops, so very easy to upgrade.",priority:"beginner"},{name:"Soldier's Set",pieces:"3 (Helm, Armor, Greaves)",where:"Bought at Ventest Clothing Boutique in Hateno Village; a step up in defense from Hylian. (Not sold at the Kakariko shop.)",bonus:"No set bonus. Higher base defense than Hylian for mid-game survivability.",upgrade:"Chuchu Jelly and Bokoblin Guts at low tiers, then Keese/Moblin and Lizalfos/Lynel parts at higher tiers.",priority:"mid"},{name:"Climbing Set (Climber's Bandanna + Climbing Gear)",pieces:"3 (Climber's Bandanna, Climbing Gear, Climbing Boots)",where:"Bandanna in a chest in Ree Dahee Shrine (Dueling Peaks); Gear in Chaas Qeta Shrine (SE off the coast); Boots in Tahno O'ah Shrine (eastern Mount Lanayru, Hateno region).",bonus:"Each piece gives Climbing Speed Up (faster scaling). Set bonus Climbing Jump Stamina Up (at 2 stars) cuts the stamina cost of jumping while climbing.",upgrade:"Keese parts plus Hightail Lizards / Hot-Footed Frogs (speed-themed materials).",priority:"beginner"},{name:"Stealth Set (Sheikah)",pieces:"3 (Stealth Mask, Stealth Chest Guard, Stealth Tights)",where:"Bought from Enchanted in Kakariko Village.",bonus:"Each piece gives Stealth Up (quieter, harder for enemies to notice). Set bonus Night Speed Up (at 2 stars).",upgrade:"Sneaky River Snails, Sunset Fireflies, and Rushrooms (stealth/night-themed materials).",priority:"mid"},{name:"Snowquill Set",pieces:"3 (Headdress, Tunic, Trousers)",where:"Bought from the Brazen Beak armor shop in Rito Village.",bonus:"Each piece gives 1 level Cold Resistance. Set bonus Unfreezable (at 2 stars) \u2014 immune to being frozen.",upgrade:"Cold-themed parts: Cold Darner, Winterwing Butterfly, and Ice Keese Wings.",priority:"beginner"},{name:"Flamebreaker Set",pieces:"3 (Helm, Armor, Boots)",where:"Helm, Armor, and Boots can be bought at Ripped and Shredded in Goron City; the Armor can alternatively be earned by trading 10 Fireproof Lizards to Kima at the Southern Mine (Fireproof Lizard Roundup).",bonus:"Each piece grants Flame Guard (resist burning/lava heat). Set bonus Fireproof (at 2 stars) \u2014 no damage from open flame.",upgrade:"Fire-themed parts: Fireproof Lizards, Smotherwing Butterflies, and Flame Keese Wings.",priority:"mid"},{name:"Desert Voe Set",pieces:"3 (Headband, Spaulder, Trousers)",where:"Bought from the armor shop in Gerudo Town, or from Rhondson once she moves to Tarrey Town.",bonus:"Each piece gives 1 level Heat Resistance (desert daytime). Set bonus Shock Resistance Up (at 2 stars) \u2014 reduces electric damage, but NOT full immunity.",upgrade:"Voltfin Trout, Voltfruit, and Electric Lizalfos parts (electricity-themed).",priority:"mid"},{name:"Gerudo Set (Vai Outfit)",pieces:"3 (Veil, Top, Sirwal)",where:"Bought from Vilia atop the cliffs at Kara Kara Bazaar for 600 rupees \u2014 required to enter Gerudo Town as a 'vai'.",bonus:"Each piece gives 1 level Heat Resistance. Set bonus Unfreezable (at 2 stars). Main draw: grants access to Gerudo Town.",upgrade:"Heat-themed parts: Hightail Lizard, Warm Darner, and Sand Cicada.",priority:"beginner"},{name:"Zora Set",pieces:"3 (Helm, Armor, Greaves)",where:"Armor from King Dorephan during the Vah Ruta quest at Zora's Domain; Helm in a sunken chest at Toto Lake; Greaves reward for the Lynel Safari side quest.",bonus:"Each piece gives Swim Speed Up; Zora Armor also lets you swim up waterfalls. Set bonus Swim Dash Stamina Up (at 2 stars) \u2014 cheaper swim-dashing.",upgrade:"Lizalfos parts (Lizalfos Tail, Talon, Horn) and Hyrule Bass \u2014 aquatic/lizard-themed.",priority:"mid"},{name:"Rubber Set",pieces:"3 (Helm, Armor, Tights)",where:"Found in shrine chests scattered across Hyrule (e.g. Toto Sah, Daka Tuss, Sasa Kai). No single shop.",bonus:"Each piece gives Shock Resistance. Set bonus Unshockable (at 2 stars) \u2014 full immunity to electric damage, including thunderstorm lightning.",upgrade:"Electricity-themed: Yellow Chuchu Jelly, Electric Keese Wings, and Electric Lizalfos Tails.",priority:"mid"},{name:"Radiant Set",pieces:"3 (Mask, Shirt, Tights)",where:"Bought from the Gerudo Secret Club in Gerudo Town after The Secret Club's Secret quest; each piece also costs Luminous Stones plus rupees.",bonus:"Set bonus (at 2 stars) Disguise (Stal-types ignore you) plus Bone Atk. Up (boosts bone/Stal-type weapon damage). Glows in the dark.",upgrade:"Luminous Stones and Stal parts (Stalkoblin/Stalizalfos bones).",priority:"late"},{name:"Barbarian Set",pieces:"3 (Helm, Armor, Leg Wraps)",where:"Each piece is a reward from a shrine inside a Labyrinth: Tu Ka'loh (Lomei Labyrinth Island), Dako Tah (South Lomei Labyrinth), Qaza Tokki (North Lomei Labyrinth).",bonus:"Each piece gives Attack Up. Set bonus Charge Attack Stamina Up (at 2 stars) \u2014 cheaper spin/charge attacks.",upgrade:"Lynel parts (Hoof, Horn, Guts) \u2014 mid-to-high tiers need Lynel materials.",priority:"late"},{name:"Ancient Set",pieces:"3 (Helm, Cuirass, Greaves)",where:"Bought from Cherry (the shop terminal) at the Akkala Ancient Tech Lab, after lighting the lab's furnace. Costs rupees + Ancient Materials.",bonus:"Each piece gives Guardian Resist Up (less damage from Guardians/ancient weapons). Set bonus Ancient Proficiency (at 2 stars) \u2014 +80% damage with ancient and Guardian weapons (not the Master Sword).",upgrade:"Ancient parts: Ancient Screws, Springs, Gears, Shafts, Cores, and a Giant Ancient Core at the top tier.",priority:"late"},{name:"Royal Guard Set",pieces:"3 (Cap, Uniform, Boots)",where:"The Champions' Ballad DLC. Pieces found in chests via the EX Royal Guard Rumors side quest (in/around Hyrule Castle).",bonus:"Set bonus Charge Attack Stamina Up. Low base defense (4 per piece). Cannot be upgraded by a Great Fairy and cannot be dyed.",upgrade:"None \u2014 this set cannot be enhanced at a Great Fairy Fountain.",priority:"late"},{name:"Wild Set (amiibo)",pieces:"3 (Cap of the Wild, Tunic of the Wild, Trousers of the Wild)",where:"Obtained via amiibo (the BotW Link amiibo / 30th Anniversary line); the classic green hero look.",bonus:"Set bonus Master Sword Beam Up (at 2 stars) \u2014 boosts the Master Sword's energy beam at full health. Each piece is high defense.",upgrade:"Star Fragments and Lynel parts (Silver/Gold Lynel Horn, Hoof, Guts) at the higher tiers.",priority:"late"}]},Pe={enemies:[{name:"Bokoblin",tier:"common",tactic:"Sneakstrike from behind for a one-shot, or aim a charged arrow at the head; a parried club leaves it open to combos.",drops:"Bokoblin Horn, Bokoblin Fang, Bokoblin Guts"},{name:"Moblin",tier:"common",tactic:"Bigger Bokoblin: dodge its wide swing, then backstab, or whittle it with arrows; a sneakstrike still helps but won't one-shot stronger ones.",drops:"Moblin Horn, Moblin Fang, Moblin Guts"},{name:"Lizalfos",tier:"common",tactic:"They strafe and leap, so bait an attack then flurry-rush; headshot arrows stagger them and elemental arrows counter their element.",drops:"Lizalfos Horn, Lizalfos Talon, Lizalfos Tail"},{name:"Chuchu (elemental)",tier:"common",tactic:"Hit Fire Chuchu with ice (and vice versa) or just smack it; killing an elemental one leaves jelly you can throw to freeze, burn, or shock foes.",drops:"Chuchu Jelly; elemental ones drop Red/White/Yellow Chuchu Jelly"},{name:"Keese",tier:"common",tactic:"Swat with any melee swing or a single arrow; elemental Keese are quenched by their opposite element and their wings/eyeballs are crafting loot.",drops:"Keese Wing, Keese Eyeball"},{name:"Octorok",tier:"common",tactic:"They snipe from grass or water, so hit the head with an arrow, or catch their rock spit on a shield to bounce it right back at them.",drops:"Octo Balloon, Octorok Tentacle, Octorok Eyeball"},{name:"Wizzrobe (elemental)",tier:"common",tactic:"Six types: Fire/Ice/Electric and stronger Meteo/Blizz/Thunder; each is weak to its opposite element, so shoot it with an opposing arrow to drop it.",drops:"Elemental rods (Fire/Ice/Lightning, and Meteor/Blizzard/Thunderstorm rods)"},{name:"Pebblit",tier:"common",tactic:"Mini-Talus in Stone, Igneo and Frost types: smash it with a heavy weapon or a bomb; Igneo and Frost ones burn or freeze on touch, so use ranged hits.",drops:"Flint, ore, or a gem (Frost ones can drop Sapphire)"},{name:"Stone Talus",tier:"mini-boss",tactic:"Climb on and pound the black ore lump on its back with a hammer/heavy weapon; bomb arrows or a Knight's claymore wreck the weak spot fast.",drops:"Flint, Amber, Opal, gems and ore"},{name:"Stone Talus (Luminous)",tier:"mini-boss",tactic:"Same fight as a Stone Talus but tougher (about 600 HP); the back lump is luminous ore, so hit it for Luminous Stone plus gems.",drops:"Luminous Stone, Topaz, Diamond, Amber, Opal, Flint"},{name:"Stone Talus (Rare)",tier:"mini-boss",tactic:"The toughest stone type (around 900 HP); attack the ore vein on its back and expect rich gem drops like Ruby, Sapphire and Diamond.",drops:"Ruby, Sapphire, Diamond, Topaz, Amber, Opal, Flint"},{name:"Igneo Talus",tier:"mini-boss",tactic:"Found in Eldin and made of lava; douse its glowing core with ice arrows to cool it, then climb up and smash the back weak point.",drops:"Flint, Ruby, ore"},{name:"Frost Talus",tier:"mini-boss",tactic:"Hebra/Gerudo highlands cousin of Igneo; hit its icy core with fire arrows to thaw it, then climb on and hammer the back lump.",drops:"Flint, Sapphire, ore"},{name:"Stal-enemies (Stalkoblin/Stalizalfos/Stalmoblin)",tier:"common",tactic:"Nighttime skeletons: knock them apart, then quickly smash the skull before the bones reassemble; one good hit to the head ends them.",drops:"Bokoblin/Moblin/Lizalfos Horns, Fangs and Talons; each leaves a usable arm (no Guts)"},{name:"Hinox",tier:"mini-boss",tactic:"Shoot its single eye to stun it, then unload on the downed giant; you can also pluck the weapons hanging from its neck while it sleeps.",drops:"Hinox Toenail, Hinox Tooth, Hinox Guts, Hinox Horn; necklace weapons"},{name:"Stalnox",tier:"mini-boss",tactic:"Skeletal Hinox: arrow its eye to make it pop out, grab or destroy the loose eyeball, then attack; smash the skull when it collapses to bones.",drops:"Hinox Tooth; rare weapons lodged in its skeleton"},{name:"Molduga",tier:"boss",tactic:"In the Gerudo sand it tracks footsteps, so toss a Remote Bomb to lure it up, detonate to stun, then sprint in and combo before it dives.",drops:"Molduga Fin, Molduga Guts"},{name:"Guardian Stalker",tier:"guardian",tactic:"Walking six-legged Guardian: perfect-parry its blue charged laser with a shield to reflect it for huge damage, or shoot the glowing eye to stun.",drops:"Ancient parts (gears, springs, cores, shafts); can drop Giant Ancient Core"},{name:"Guardian Skywatcher",tier:"guardian",tactic:"Flying Guardian that beams from above; time a shield parry on its laser to bounce it back, or snipe the eye with ancient/strong arrows.",drops:"Ancient parts (gears, cores, shafts); can drop Giant Ancient Core"},{name:"Guardian Turret",tier:"guardian",tactic:"Stationary laser Guardian fixed to floors in shrines/ruins; parry the laser back at it or arrow the eye, then climb up to finish it.",drops:"Ancient parts; can drop Giant Ancient Core"},{name:"Decayed Guardian",tier:"guardian",tactic:"Broken husks stuck in the ground that swing arms; dodge the sweep and flurry-rush, or just shoot the eye and smash the arms off.",drops:"Ancient parts (often Ancient Screw/Spring)"},{name:"Guardian Scout",tier:"guardian",tactic:"Shrine Guardians come in I-IV with sword/spear/laser arms; flurry-rush after a dodge and parry the spinning laser sweep to reflect it.",drops:"Ancient parts; Scout III/IV can drop an Ancient Core"},{name:"Yiga Footsoldier",tier:"yiga",tactic:"They disguise as travelers then turn hostile; dodge the sickle and flurry-rush, stun with arrows, and many can be calmed with a Mighty Banana.",drops:"Mighty Bananas, occasionally weapons"},{name:"Yiga Blademaster",tier:"yiga",tactic:"Big windcleaver Yiga that teleports and goes invisible; wait out the leaping overhead slam, sidestep into a flurry rush, repeat until down.",drops:"Mighty Bananas, Demon Carver/Windcleaver, gems"},{name:"Lynel (Red-maned)",tier:"mini-boss",tactic:"Weakest Lynel: headshot to stagger, sprint up and mount it for free hits; perfect-dodge its charge or parry its beam to flurry-rush.",drops:"Lynel Horn/Hoof/Guts, Lynel weapons, shield"},{name:"Lynel (Blue-maned)",tier:"mini-boss",tactic:"Tougher than red and adds fire/elemental attacks; same plan: headshot to stun, mount and slash, flurry-rush its melee and charges.",drops:"Lynel Horn/Hoof/Guts, stronger Lynel gear"},{name:"Lynel (White-maned)",tier:"mini-boss",tactic:"High HP and aggressive elemental attacks; stock strong bows for headshot stuns, mount for big hits, and never stop dodging into flurry rushes.",drops:"Lynel Horn/Hoof/Guts, mighty Lynel gear"},{name:"Lynel (Silver)",tier:"mini-boss",tactic:"The deadliest Lynel with the most HP; multishot bow headshots to stun, mount and combo, and flurry-rush every charge, slam and beam.",drops:"Lynel Horn/Hoof/Guts, savage Lynel weapons/shield/bow"},{name:"Windblight Ganon",tier:"boss",tactic:"Vah Medoh blight: use Revali's Gale to reposition past its wind blasts, then snipe the glowing eye; bomb arrows or a strong bow burn it down.",drops:null},{name:"Waterblight Ganon",tier:"boss",tactic:"Vah Ruta blight: in phase two raise Cryonis blocks for cover and to climb, dodge the spear lunges, and flurry-rush or arrow the eye.",drops:null},{name:"Fireblight Ganon",tier:"boss",tactic:"Vah Rudania blight: shield or dodge its fireballs, and when it charges a fire ring, hit it with an ice arrow or Daruk's Protection to break it.",drops:null},{name:"Thunderblight Ganon",tier:"boss",tactic:"Vah Naboris blight: flurry-rush its lightning-fast dashes in phase one; in phase two it electrifies pillars, so topple one with a strike to stun it.",drops:null},{name:"Calamity Ganon",tier:"boss",tactic:"Final boss recaps the Blights' attacks; parry Guardian-style lasers, flurry-rush its melee, and pour bomb/ancient arrows into the orange weak spot.",drops:null},{name:"Dark Beast Ganon",tier:"boss",tactic:"On horseback, fire the Bow of Light at the glowing spots on each side (three per side), then the belly spot, then the eye on its forehead to win.",drops:null}]},z={rules:["One effect per dish. A cooked meal or elixir can only carry a single special effect at a time. Mixing two different effect-types (e.g. Hearty + Spicy) cancels both and gives a plain dish with no bonus.","Stack the SAME prefix to extend or strengthen. Adding more ingredients of one effect raises its tier (Mighty I to III) or its timer; e.g. 5 Hasty ingredients give a longer speed buff than 1.","Cook in a Pot (a lit cooking pot), not a campfire. Tossing ingredients on an open campfire just chars single items (Baked Apple, Toasted Hateno Cheese); it cannot combine ingredients or make effect dishes/elixirs.","Max 5 ingredients per dish. The pot accepts up to five items at once; plan your stack around that cap.","Elixirs = critter + monster part. Combine at least one effect-bearing critter (lizard, frog, bug, etc.) with any monster part (horn, fang, guts, wing) to brew an elixir. Critters alone or monster parts alone will NOT cook.","Hearty effect adds temporary (yellow) hearts and FULLY refills your red hearts. Energizing instantly refills stamina; Enduring (Endura) adds overfilled green/temporary stamina wheel.","Effect strength/duration comes from the ingredients, so a dish's timer scales with how many same-effect items and high-tier items you use; tiers cap at level 3 for most buffs (Mighty/Tough/Hasty/Sneaky etc.).","Monster Extract is a wild-card seasoning: it randomizes the dish, forcing the duration to roughly 1, 10, or 30 minutes (and can swing hearts), and it overrides the normal duration/crit bonuses, so don't combine it with dragon parts or star fragments.","Dubious Food results from cooking only effect-less items, mismatched effects, or critters/monster parts with no valid pairing. It restores a small random number of hearts and has no effect.","Rock-Hard Food results from cooking inedible items (wood, ore, weapons, Amber, etc.). It restores only a tiny sliver of health and is essentially a fail.","Critical Cooking gives a bonus (one of: +1 effect tier, +5:00 duration, or extra hearts/stamina/yellow hearts). It is guaranteed during a Blood Moon, and guaranteed when a Dragon part or Star Fragment is in the recipe; otherwise it is a low base random chance per cook.","Fairy Tonic is a special elixir made from a Fairy plus any monster part (or other materials); it simply restores hearts and carries no buff, useful for clearing inventory or a quick heal recipe.","Dragon parts are seasonings that extend duration and guarantee a critical cook. By part the bonus is graduated: Scale ~+1:30, Claw ~+3:30, Shard of Fang ~+10:00, Shard of Horn maxes the timer to 30:00. Star Fragments also guarantee a critical cook.","Identify the prefix on each raw ingredient (Hasty, Mighty, Spicy, etc.) and only combine matching prefixes for a clean, strong dish; mixing prefixes cancels the effect."],effects:[{effect:"Hearty",does:"Fully restores all red hearts AND adds extra temporary (yellow) hearts on top.",ingredients:"Hearty Durian, Hearty Truffle, Hearty Bass, Hearty Radish, Hearty Blueshell Snail, Hearty Salmon, Hearty Lizard; Big Hearty Truffle and Big Hearty Radish give a bigger yellow-heart boost.",elixir:null},{effect:"Energizing",does:"Instantly refills your stamina wheel (good for climbing/swimming mid-action).",ingredients:"Stamella Shroom, Restless Cricket, Bright-Eyed Crab, Courser Bee Honey, Staminoka Bass.",elixir:"Restless Cricket + monster part = Energizing Elixir"},{effect:"Enduring",does:"Refills stamina and overfills it with extra (green) temporary stamina wheel segments.",ingredients:"Endura Carrot, Endura Shroom, Tireless Frog (elixir).",elixir:"Tireless Frog + monster part = Enduring Elixir"},{effect:"Spicy",does:"Cold resistance - keeps you warm in freezing regions (and lets you survive cold areas).",ingredients:"Spicy Pepper, Sunshroom, Warm Safflina, Summerwing Butterfly, Sizzlefin Trout, Warm Darner; Dinraal (fire dragon) parts add cold resistance.",elixir:"Summerwing Butterfly + monster part = Spicy Elixir"},{effect:"Chilly",does:"Heat resistance - prevents overheating in Gerudo Desert / Eldin region (does NOT stop flame damage).",ingredients:"Hydromelon, Chillshroom, Cool Safflina, Winterwing Butterfly, Chillfin Trout, Cold Darner; Naydra (ice dragon) parts add heat resistance.",elixir:"Winterwing Butterfly + monster part = Chilly Elixir"},{effect:"Fireproof",does:"Prevents catching fire from flames/lava environments (essential on Death Mountain). ELIXIR ONLY - cannot be cooked into a food dish.",ingredients:"Fireproof Lizard, Smotherwing Butterfly (each + a monster part). Note: Naydra's frost parts can be added to extend a fireproof elixir's timer.",elixir:"Smotherwing Butterfly (or Fireproof Lizard) + monster part = Fireproof Elixir"},{effect:"Electro",does:"Shock resistance - reduces or negates lightning/electric damage and stops weapons being knocked from your hand.",ingredients:"Voltfruit, Zapshroom, Electric Safflina, Thunderwing Butterfly, Voltfin Trout, Electric Darner; Farosh (lightning dragon) parts add shock resistance.",elixir:"Thunderwing Butterfly + monster part = Electro Elixir"},{effect:"Mighty (Attack Up)",does:"Raises melee/ranged attack power for a duration - the key Ganon/lynel buff.",ingredients:"Mighty Bananas, Razorshroom, Mighty Carp, Mighty Porgy, Razorclaw Crab, Mighty Thistle, Bladed Rhino Beetle (elixir).",elixir:"Bladed Rhino Beetle + monster part = Mighty Elixir"},{effect:"Tough (Defense Up)",does:"Raises defense so you take less damage from attacks.",ingredients:"Ironshroom, Armored Carp, Armored Porgy, Ironshell Crab, Fortified Pumpkin, Rugged Rhino Beetle (elixir).",elixir:"Rugged Rhino Beetle + monster part = Tough Elixir"},{effect:"Hasty (Speed Up)",does:"Increases movement speed - run, swim, and climb faster.",ingredients:"Swift Carrot, Rushroom, Swift Violet, Fleet-Lotus Seeds, Hot-Footed Frog (elixir).",elixir:"Hot-Footed Frog + monster part = Hasty Elixir"},{effect:"Sneaky (Stealth Up)",does:"Boosts stealth - quieter footsteps, enemies/animals notice you less. Great for hunting and the Yiga.",ingredients:"Silent Princess, Silent Shroom, Blue Nightshade, Sneaky River Snail, Stealthfin Trout, Sunset Firefly (elixir).",elixir:"Sunset Firefly + monster part = Sneaky Elixir"}],recipes:[{name:"5 Big Hearty Radishes (or 5 Big Hearty Truffles)",makes:"Hearty meal - full red-heart refill plus the maximum +25 extra yellow hearts.",why:"The best survival/bossing food. Five Big Hearty items overcap your hearts so you can tank lynels and Ganon hits. (5 standard Hearty Durians give a smaller +20.)"},{name:"5 Hasty ingredients (e.g. 5 Swift Carrots or Rushrooms)",makes:"Hasty dish at level 3 speed - long fast-run/climb buff.",why:"Stacking five same-prefix Hasty items pushes both tier and timer; ideal for travel, racing shrine quests, and outrunning Guardians."},{name:"Mighty Bananas x4-5 (Mighty Simmered Fruit)",makes:"Attack Up Lv3 (Mighty) meal for several minutes.",why:"Cheap, farmable attack buff. Eat right before fighting Ganon, Lynels, or Hinox - extra attack tiers massively shorten fights. Bananas grow in tropical Faron."},{name:"Bladed Rhino Beetle + Bokoblin Horn (Mighty Elixir)",makes:"Attack Up elixir; add a Shard of Dragon Horn to push duration to the 30:00 max.",why:"Elixir route to attack-up when you lack Mighty produce; a dragon part guarantees a critical cook and a long timer for boss runs."},{name:"Endura Carrot x4-5 (Enduring dish)",makes:"Bonus overfilled stamina wheel(s).",why:"Lets you scale the tallest cliffs (Vah Rudania, towers) without running out of stamina; the extra green wheel is huge for exploration."},{name:"Fairy + any monster part (Fairy Tonic)",makes:"Plain healing elixir.",why:"Quick heal that also lets you offload spare fairies/monster parts; no buff, but reliable hearts in a pinch."},{name:"Hearty Salmon + Tabantha Wheat + Goat Butter (Hearty Salmon Meuniere)",makes:"A named gourmet Hearty dish (a quest favorite) with full heal + yellow hearts.",why:"The real BotW recipe needs only those three items; add Rock Salt or Goron Spice to extend the timer. Ingredients gather easily around Tabantha/Rito Village."}],dragons:[{name:"Dinraal",element:"Fire",where:"Flies over the Eldin region, appearing near Death Mountain and along Tanagar Canyon, spawning around 5am at the north end and drifting through the morning.",parts:"Scale (+~1:30 duration), Claw (+~3:30), Shard of Dinraal's Fang (+~10:00), Shard of Dinraal's Horn (maxes timer to 30:00). As the fire dragon, Dinraal's parts add COLD RESISTANCE (Spicy/warm) to an elixir and guarantee a critical cook."},{name:"Naydra",element:"Ice / Frost",where:"Circles the Lanayru region, notably around Mount Lanayru and the Lanayru Road/Promenade; appears at night and into the early morning.",parts:"Scale (+~1:30), Claw (+~3:30), Shard of Naydra's Fang (+~10:00), Shard of Naydra's Horn (maxes timer to 30:00). As the ice/frost dragon, Naydra's parts add HEAT RESISTANCE (Chilly) and can extend Fireproof elixirs; they also guarantee a critical cook."},{name:"Farosh",element:"Electricity / Lightning",where:"Roams the Faron region around Lake Hylia and the Bridge of Hylia, breaching from Lake Hylia/Riola Spring; often appears near waterways around dawn.",parts:"Scale (+~1:30), Claw (+~3:30), Shard of Farosh's Fang (+~10:00), Shard of Farosh's Horn (maxes timer to 30:00). As the lightning dragon, Farosh's parts add SHOCK RESISTANCE (Electro) to an elixir and guarantee a critical cook."}]},Ee={what:"Korok Seeds are the reward for solving 900 little hidden puzzles across Hyrule. You trade them to Hestu, a big maraca-shaped Korok, who uses them to permanently expand your three gear pouches: weapon slots, bow slots, and shield slots. More slots means you carry more gear and break fewer weapons mid-fight, so growing your inventory is one of the most useful early grinds.",hestu:`Hestu moves, then settles. (1) First meeting: on the road between Dueling Peaks Stable and Kakariko Village, just past Kakariko Bridge \u2014 do the favor in the side quest The Priceless Maracas (recover his maracas from nearby Bokoblins) and he starts upgrading. (2) Next: near Riverside Stable, west of Kakariko in Hyrule Field, by a tree along the road. (3) Permanent home: Korok Forest, deep in the Great Hyrule Forest up north (Lost Woods), by the Great Deku Tree. Rising cost curve per slot \u2014 Weapons (11 upgrades): 1,2,3,5,8,12,17,25,35,45,55 = 208. Bows (8): 1,2,3,5,8,12,17,25 = 73. Shields (16): 1,2,3,4,5,10,10,10,10,10,15,15,15,15,15,20 = 160. Maxing ALL pouches costs exactly 441 seeds \u2014 that is the cap; beyond that, extra seeds do nothing for inventory. 900 seeds exist total; turning in all 900 earns Hestu's Gift, a purely cosmetic golden poop ("smells pretty bad") \u2014 a joke reward, no stats.`,puzzleTypes:[{type:"Rock in a ring / lift the lone rock",how:"See a circle of stones with one gap, or a single suspicious rock sitting alone? Pick up a nearby rock and drop it in the ring, or just lift the lone rock to reveal the Korok under it."},{type:"Complete the pattern",how:"A near-symmetrical arrangement (rocks, blocks) with one piece obviously missing. Add or move a rock/block to finish the symmetry."},{type:"Stone circles / place the boulder",how:"A ring of small stones around an empty center wants a boulder rolled or carried into the middle."},{type:"Flower trail",how:"Spot a line of identical flowers (often yellow). Run to and touch each one IN ORDER without missing any; the last one spawns the Korok."},{type:"Balls / orbs in holes",how:"A metal or stone ball near matching divots \u2014 roll or carry it into the hole. Sometimes you guide it with Magnesis or Stasis."},{type:"Race / reach the goal in time",how:"Activate a glowing wisp or ring of light, then sprint (often paraglide or shield-surf) to the goal before the timer runs out."},{type:"Shoot the target",how:"Spot a balloon, an acorn, an apple/fruit, or a small mark? Hit it with an arrow. Sometimes several balloons must all be popped."},{type:"Offering to a pedestal / altar",how:"A small shrine-like pedestal with a fruit or item carved on it \u2014 place that exact item (apple, durian, etc.) on it."},{type:"Matching spin (pinwheel / cube)",how:"Two pinwheels or a floating cube \u2014 rotate the cube (climb and push, or Magnesis) so its colored faces match the surrounding pattern."},{type:"Light the torches",how:"Several unlit torches near one lit flame (or you bring fire). Light every torch, usually using a torch/fire arrow/flint."},{type:"Dive into a ring",how:"A ring of light or floating circle below a cliff \u2014 paraglide or dive straight through the center to spawn the Korok."}],hotspots:["Out-of-place rocks: a single rock on a stump, peak, or cliff edge is almost always a lift-the-rock Korok \u2014 check every lonely boulder.","Circles with a gap: any ring of stones missing one piece means grab the nearest loose rock and complete it.","Tops of things: peaks, towers, ruined pillars, and lone trees on hills frequently hide rock-lift or dive-into-ring puzzles \u2014 climb up and look around.","Stables and Towers: the ground around every Stable and Sheikah Tower usually has 1-2 easy Koroks (rocks, balloons, or flower trails) right nearby.","Bright fruit/acorns on trees: an apple or acorn sitting alone on a branch or pinwheel-marked tree is a shoot-the-target Korok.","Geometry that looks 'almost right': any too-neat pile, pattern, or symmetry that's off by one piece is a complete-the-pattern puzzle."]},Ke={upgrades:["Spirit Orbs: trade 4 at any Goddess Statue for one Heart Container or one Stamina Vessel. You get 1 orb per shrine (120 shrines = 30 vessels total to earn).","Mix freely: spend orbs on hearts, stamina, or both. Stamina caps at 3 full wheels, which takes 10 Stamina Vessels (you start with one wheel); the rest can go to hearts (max 30 hearts total).","Heart<->stamina swap: the Horned Statue (a.k.a. the Goddess Statue's dark twin) in Hateno Village buys back a vessel for 100 rupees and sells you the other type, letting you re-spec anytime.","Master Sword: pull it from the pedestal in Korok Forest, but it only releases if you have at least 13 full Heart Containers (temporary/food hearts don't count).","Master Sword never breaks; its energy depletes after heavy use and recharges in about 10 minutes. Its base 30 damage doubles to 60 versus Guardians and Ganon-corrupted foes. The DLC Trial of the Sword extends its energy so it stays powered up far longer."],fairies:[{name:"Cotera",location:"Great Fairy Fountain northeast of Kakariko Village (Necluda): head north up the village, then east past Ta'loh Naeg Shrine into the woods",cost:"First fountain you open costs 100 rupees"},{name:"Kaysa",location:"Great Fairy Fountain in the Tabantha Frontier near Tabantha Bridge Stable, on Piper Ridge (Rito region, west Hyrule)",cost:"Second fountain costs 500 rupees"},{name:"Mija",location:"Great Fairy Fountain on the east bank of Lake Akkala in the Akkala Highlands (warp Dah Hesho Shrine), near South Akkala Stable (northeast Hyrule)",cost:"Third fountain costs 1,000 rupees"},{name:"Tera",location:"Great Fairy Fountain at Dragon's Exile in the southwest Gerudo Desert, in the Gerudo Great Skeleton near Hawa Koth Shrine",cost:"Fourth fountain costs 10,000 rupees"}],materials:[{name:"Star Fragment",use:"Top-tier upgrade material for the best armor tiers (Champion's Tunic, ancient armor, etc.); also sells well",where:"Drops from a fallen shooting star at night. Watch the sky, mark where it lands, and grab it before dawn (it vanishes at sunrise)."},{name:"Dragon parts (Naydra, Dinraal, Farosh)",use:"Scales, claws, horn shards, and fangs upgrade armor and brew long elixirs; any single dragon part sets an elixir's duration to the maximum 30:00",where:"Shoot a body part off a roaming dragon with an arrow (never the eyes; horn/foot/mouth give shards). Naydra: Mount Lanayru. Dinraal: Eldin/Tanagar Canyon. Farosh: Faron/Lake Hylia."},{name:"Ancient parts (gears, screws, shafts, cores, Giant Ancient Core)",use:"Trade at the Akkala Ancient Tech Lab to craft ancient arrows and the powerful Ancient armor set / Guardian-tier gear",where:"Drop from defeated Guardians (Stalkers, Skywatchers, turrets). Light the lab's furnace with the blue flame first to unlock crafting."},{name:"Rare gems (diamond, ruby, sapphire, topaz, opal, amber)",use:"Required for many armor upgrades and for forging gem-set gear; rubies/sapphires also brew fire/cold resist elixirs",where:"Mine ore deposits (black = common, ore-flecked = rare gems) with a hammer-like weapon, or buy/sell at Goron City gem shops near Gut Check Rock."},{name:"amiibo materials",use:"Tapping Zelda-series amiibo can drop rare gear, food, and exclusive armor. The Breath of the Wild-series Link amiibo can grant the Wild armor set; the 30th Anniversary 8-bit Link amiibo can grant the classic Sword (attack 22), not the Master Sword",where:"Enable amiibo in System settings, then use the amiibo rune in-game once per amiibo per day (most rewards require freeing at least one Divine Beast)."}],dlc:["DLC works via the Expansion Pass (two packs). Pack 1 'The Master Trials' adds the Trial of the Sword (extends the Master Sword's powered-up duration), Master Mode (a harder save with self-healing, ranked-up enemies and floating sky platforms), Hero's Path travel log, Travel Medallion, Korok Mask, and several themed armor pieces hidden in chests.","Pack 2 'The Champions' Ballad' adds a new main quest unlocked after all four Divine Beasts, granting the One-Hit Obliterator challenge, the Master Cycle Zero (rideable motorcycle) rune, extra shrines, upgraded Champion abilities, and lore on the four Champions.","If you don't own the Expansion Pass, none of the above is available; the base game's 120 shrines, 4 Divine Beasts and Master Sword are unaffected."]};ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(ye));
</script>
